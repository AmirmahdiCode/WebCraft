<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockWeb | بلوک‌ها</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e2e8f0;
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
      --dark: #0f172a; --text: #334155; --text-light: #94a3b8;
      --white: #ffffff; --red: #f43f5e; --green: #10b981;
      --orange: #f59e0b; --purple: #a855f7;
      --yellow: #eab308; --blue: #3b82f6; --violet: #8b5cf6;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .header {
      background: var(--white); box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 10px 16px; border-bottom: 1px solid var(--bg3);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
    }
    .header-logo i { font-size: 18px; color: #fff; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--dark); }
    .header-btns { display: flex; align-items: center; gap: 6px; }
    .header-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; text-decoration: none;
      padding: 6px 11px; border-radius: 7px;
      transition: all 0.2s ease; white-space: nowrap;
      font-family: inherit; cursor: pointer; background: none;
      color: var(--text); border: 1.5px solid var(--bg3);
    }
    .header-btn:hover { background: var(--bg2); }
    .btn-save { background: var(--green); color: #fff; border: none; }
    .btn-preview { background: var(--primary); color: #fff; border: none; }

    .builder-layout { flex: 1; display: flex; overflow: hidden; }

    .pages-panel {
      width: 200px; background: var(--white); border-left: 1px solid var(--bg3);
      overflow-y: auto; padding: 12px; flex-shrink: 0;
    }
    .pages-panel h4 {
      font-size: 12px; color: var(--text-light); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .page-tab {
      padding: 10px 12px; border-radius: 10px; margin-bottom: 4px;
      cursor: pointer; font-size: 12px; font-weight: 600;
      color: var(--text); transition: all 0.2s ease;
      display: flex; align-items: center; gap: 8px;
      border: 1.5px solid transparent;
    }
    .page-tab:hover { background: var(--bg2); }
    .page-tab.active { background: #eef2ff; border-color: var(--primary); color: var(--primary); }
    .page-tab i { font-size: 13px; }
    .btn-add-page {
      width: 100%; padding: 10px; border-radius: 10px; margin-top: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.2s ease;
      background: none; color: var(--primary); border: 1.5px dashed var(--primary-light);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-add-page:hover { background: #eef2ff; }

    .canvas-area {
      flex: 1; overflow-y: auto; padding: 20px;
      background: var(--bg2); position: relative;
    }
    .canvas-area::-webkit-scrollbar { width: 6px; }
    .canvas-area::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 10px; }

    .drop-zone {
      min-height: 400px; border: 2px dashed var(--bg3); border-radius: 16px;
      padding: 16px; transition: all 0.3s ease;
    }
    .drop-zone.drag-over { border-color: var(--primary); background: #eef2ff; }
    .drop-zone.has-blocks { border-style: solid; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-light);
    }
    .empty-state i { font-size: 48px; margin-bottom: 12px; display: block; color: var(--bg3); }

    .container-block {
      background: var(--white); border-radius: 14px; margin-bottom: 16px;
      border: 1px solid var(--bg3); overflow: hidden;
    }
    .container-header {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
    }
    .block-badge {
      padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; color: #fff;
    }
    .badge-green { background: var(--green); }
    .badge-red { background: var(--red); cursor: pointer; }
    .badge-red:hover { filter: brightness(1.1); }

    .tree-row {
      display: flex; align-items: center; padding: 8px 14px;
      border-top: 1px solid var(--bg2); gap: 0; position: relative;
      min-height: 50px;
    }
    .node-badge {
      padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 600;
      color: #fff; cursor: pointer; position: relative; white-space: nowrap;
      transition: all 0.2s ease; flex-shrink: 0;
    }
    .node-badge:hover { filter: brightness(1.1); }
    .node-badge i { font-size: 11px; }
    .badge-yellow { background: var(--yellow); color: #0f172a; }
    .badge-blue { background: var(--blue); }
    .badge-violet { background: var(--violet); }

    .node-delete {
      position: absolute; top: -6px; left: -6px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--red); color: #fff; border: none;
      cursor: pointer; font-size: 9px; display: none;
      align-items: center; justify-content: center; z-index: 10;
    }
    .node-badge:hover .node-delete { display: flex; }

    .connector-h { width: 24px; height: 2px; background: var(--bg3); flex-shrink: 0; }
    .connector-v { width: 2px; background: var(--bg3); flex-shrink: 0; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .code-output {
      background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 12px;
      font-family: 'Courier New', monospace; font-size: 12px;
      white-space: pre-wrap; max-height: 60vh; overflow-y: auto;
      direction: ltr; text-align: left;
    }
    .preview-frame {
      width: 100%; height: 60vh; border: 1px solid var(--bg3); border-radius: 12px; background: #fff;
    }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px;
      width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--bg3);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 15px; color: var(--dark); }
    .modal-close { background: none; border: none; font-size: 16px; color: var(--text-light); cursor: pointer; }
    .modal-body { padding: 16px 20px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--bg3); border-radius: 8px;
      font-size: 12px; color: var(--dark); background: var(--bg);
      outline: none; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99,102,241,0.1);
    }
    .btn-apply {
      width: 100%; padding: 11px; background: var(--primary); color: #fff;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 6px;
    }
    .btn-apply:hover { background: var(--primary-dark); }

    .add-buttons-bar {
      display: flex; gap: 6px; padding: 8px 14px; border-top: 1px solid var(--bg2);
      flex-wrap: wrap;
    }
    .btn-add-block {
      padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 600;
      cursor: pointer; border: none; color: #fff;
      font-family: inherit; transition: all 0.2s ease;
    }
    .btn-add-green { background: var(--green); }
    .btn-add-red { background: var(--red); }
    .btn-add-yellow { background: var(--yellow); color: #0f172a; }
    .btn-add-blue { background: var(--blue); }
    .btn-add-violet { background: var(--violet); }

    @media (max-width: 768px) {
      .builder-layout { flex-direction: column; }
      .pages-panel { width: 100%; border-left: none; border-bottom: 1px solid var(--bg3); display: flex; flex-wrap: wrap; gap: 4px; }
      .pages-panel h4 { display: none; }
      .page-tab { flex: 1; min-width: 80px; justify-content: center; font-size: 10px; }
      .btn-add-page { flex: 1; min-width: 80px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-right">
      <div class="header-logo"><i class="fa-solid fa-cubes"></i></div>
      <span class="header-title">BlockWeb Builder</span>
    </div>
    <div class="header-btns">
      <button class="header-btn" onclick="switchTab('blocks')">بلوک‌ها</button>
      <button class="header-btn btn-preview" onclick="switchTab('preview')">پیش‌نمایش</button>
      <button class="header-btn" onclick="switchTab('code')">کد</button>
      <button class="header-btn btn-save" onclick="saveBlocks()">ذخیره</button>
      <a href="../dashboard.html" class="header-btn">خروج</a>
    </div>
  </header>

  <div class="builder-layout">

    <div class="canvas-area">
      <div class="tab-content active" id="tab-blocks">
        <div class="drop-zone" id="dropZone">
          <div class="empty-state" id="emptyState">
            <i class="fa-solid fa-cubes"></i>
            <p>از پنل سمت راست یک محدوده اضافه کنید</p>
          </div>
          <div id="treeContainer"></div>
        </div>
      </div>
      <div class="tab-content" id="tab-preview">
        <iframe class="preview-frame" id="previewFrame"></iframe>
      </div>
      <div class="tab-content" id="tab-code">
        <div class="code-output" id="codeOutput">کد HTML اینجا نمایش داده می‌شود...</div>
      </div>
    </div>

    <div class="pages-panel" id="pagesPanel">
      <h4><i class="fa-solid fa-files"></i> صفحات</h4>
      <div id="pageTabs"></div>
      <button class="btn-add-page" onclick="addPage()"><i class="fa-solid fa-plus"></i> صفحه جدید</button>
      <div style="margin-top:12px;border-top:1px solid var(--bg3);padding-top:12px;">
        <h4 style="margin-bottom:6px;"><i class="fa-solid fa-plus-circle"></i> افزودن بلوک</h4>
        <div class="add-buttons-bar" style="flex-direction:column;border:none;">
          <button class="btn-add-green btn-add-block" onclick="addContainer()"><i class="fa-solid fa-square"></i> محدوده جدید</button>
          <button class="btn-add-yellow btn-add-block" onclick="addRowToCurrentContainer()"><i class="fa-solid fa-palette"></i> ردیف جدید</button>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">ویرایش بلوک</h3>
        <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxNtG79HTd2nfld3Hd1wdUyumvGqsQgE7nrog6F6xpdB7RkYx8Zl_tGlxvMMozaoQT3/exec';
    const SESSION_DURATION = 3 * 60 * 60 * 1000;

    let projectId = null;
    let domainName = null;
    let currentUser = null;
    let wizardSettings = null;
    let treeData = { pages: [{ id: 'pg_1', name: 'صفحه اصلی', containers: [] }] };
    let activePageIdx = 0;
    let editingBlock = null;

    class BlockWebApp {
      constructor() {
        this.webApp = window.Eitaa && window.Eitaa.WebApp ? window.Eitaa.WebApp : null;
        if (this.webApp) { this.webApp.ready(); this.webApp.expand(); }
      }
    }

    function checkSession() {
      const sessionData = localStorage.getItem('blockweb_session');
      if (!sessionData) return null;
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('blockweb_session');
          return null;
        }
        return session.user;
      } catch (e) {
        localStorage.removeItem('blockweb_session');
        return null;
      }
    }

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return { domain: params.get('domain') };
    }

    function getActivePage() { return treeData.pages[activePageIdx]; }
    function getActiveContainers() { return getActivePage().containers; }

    function addPage() {
      const name = prompt('نام صفحه جدید:');
      if (!name) return;
      treeData.pages.push({ id: 'pg_' + Date.now(), name: name, containers: [] });
      activePageIdx = treeData.pages.length - 1;
      renderAll();
    }

    function switchPage(idx) {
      activePageIdx = idx;
      renderAll();
    }

    function deletePage(idx) {
      if (treeData.pages.length <= 1) { alert('حداقل یک صفحه باید وجود داشته باشد.'); return; }
      if (!confirm('این صفحه و همه محتوایش حذف شود؟')) return;
      treeData.pages.splice(idx, 1);
      if (activePageIdx >= treeData.pages.length) activePageIdx = treeData.pages.length - 1;
      renderAll();
    }

    function addContainer() {
      getActiveContainers().push({ id: 'c_' + Date.now(), layout: 'grid', rows: [] });
      renderAll();
    }

    function addRowToCurrentContainer() {
      const containers = getActiveContainers();
      if (containers.length === 0) { alert('ابتدا یک محدوده اضافه کنید.'); return; }
      const lastContainer = containers[containers.length - 1];
      lastContainer.rows.push({
        id: 'r_' + Date.now(),
        visual: { content: 'متن اینجا', style: { fontSize: '16px', textAlign: 'right' } },
        script: { type: 'heading', animation: '', link: '' },
        resource: { color: '#6366f1', icon: '', image: '', sound: '' }
      });
      renderAll();
    }

    function deleteContainer(containerIdx) {
      if (!confirm('این محدوده حذف شود؟')) return;
      getActiveContainers().splice(containerIdx, 1);
      renderAll();
    }

    function deleteRow(containerIdx, rowIdx) {
      if (!confirm('این ردیف حذف شود؟')) return;
      getActiveContainers()[containerIdx].rows.splice(rowIdx, 1);
      renderAll();
    }

    function changeLayout(containerIdx) {
      const cont = getActiveContainers()[containerIdx];
      const options = ['grid', 'list', 'custom'];
      const current = options.indexOf(cont.layout);
      const next = (current + 1) % options.length;
      cont.layout = options[next];
      renderAll();
    }

    function openEditModal(containerIdx, rowIdx, part) {
      const row = getActiveContainers()[containerIdx].rows[rowIdx];
      editingBlock = { containerIdx, rowIdx, part };
      const modal = document.getElementById('editModal');
      let title = '', body = '';

      if (part === 'visual') {
        title = 'بلوک زرد (ظاهری)';
        body = `
          <div class="form-group"><label>متن</label><textarea id="editContent" rows="3">${row.visual.content || ''}</textarea></div>
          <div class="form-group"><label>سایز فونت</label><input type="text" id="editFontSize" value="${row.visual.style?.fontSize || '16px'}"></div>
          <div class="form-group"><label>چینش</label><select id="editTextAlign">
            <option value="right" ${row.visual.style?.textAlign === 'right' ? 'selected' : ''}>راست‌چین</option>
            <option value="center" ${row.visual.style?.textAlign === 'center' ? 'selected' : ''}>وسط‌چین</option>
            <option value="left" ${row.visual.style?.textAlign === 'left' ? 'selected' : ''}>چپ‌چین</option>
          </select></div>`;
      } else if (part === 'script') {
        title = 'بلوک آبی (اسکریپت)';
        body = `
          <div class="form-group"><label>نوع المان</label><select id="editScriptType">
            <option value="heading" ${row.script.type === 'heading' ? 'selected' : ''}>عنوان</option>
            <option value="button" ${row.script.type === 'button' ? 'selected' : ''}>دکمه</option>
            <option value="card" ${row.script.type === 'card' ? 'selected' : ''}>کارت</option>
            <option value="text" ${row.script.type === 'text' ? 'selected' : ''}>متن ساده</option>
          </select></div>
          <div class="form-group"><label>لینک مقصد (برای دکمه)</label><input type="text" id="editLink" value="${row.script.link || ''}" placeholder="https://... یا #section"></div>
          <div class="form-group"><label>انیمیشن</label><select id="editAnimation">
            <option value="" ${!row.script.animation ? 'selected' : ''}>بدون انیمیشن</option>
            <option value="fade" ${row.script.animation === 'fade' ? 'selected' : ''}>محو شدن</option>
            <option value="slide" ${row.script.animation === 'slide' ? 'selected' : ''}>اسلاید</option>
          </select></div>`;
      } else if (part === 'resource') {
        title = 'بلوک بنفش (منابع)';
        body = `
          <div class="form-group"><label>رنگ</label><input type="color" id="editColor" value="${row.resource.color || '#6366f1'}"></div>
          <div class="form-group"><label>آیکون</label><input type="text" id="editIcon" value="${row.resource.icon || ''}" placeholder="fa-star"></div>
          <div class="form-group"><label>لینک تصویر</label><input type="text" id="editImage" value="${row.resource.image || ''}"></div>
          <div class="form-group"><label>لینک صوت</label><input type="text" id="editSound" value="${row.resource.sound || ''}"></div>`;
      }

      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').innerHTML = body + '<button class="btn-apply" onclick="applyEdit()">اعمال تغییرات</button>';
      modal.classList.add('active');
    }

    function applyEdit() {
      if (!editingBlock) return;
      const { containerIdx, rowIdx, part } = editingBlock;
      const row = getActiveContainers()[containerIdx].rows[rowIdx];

      if (part === 'visual') {
        row.visual.content = document.getElementById('editContent')?.value || '';
        row.visual.style = {
          fontSize: document.getElementById('editFontSize')?.value || '16px',
          textAlign: document.getElementById('editTextAlign')?.value || 'right'
        };
      } else if (part === 'script') {
        row.script.type = document.getElementById('editScriptType')?.value || 'heading';
        row.script.animation = document.getElementById('editAnimation')?.value || '';
        row.script.link = document.getElementById('editLink')?.value || '';
      } else if (part === 'resource') {
        row.resource.color = document.getElementById('editColor')?.value || '#6366f1';
        row.resource.icon = document.getElementById('editIcon')?.value || '';
        row.resource.image = document.getElementById('editImage')?.value || '';
        row.resource.sound = document.getElementById('editSound')?.value || '';
      }
      
      closeModal();
      renderAll();
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      editingBlock = null;
    }

    function renderAll() {
      renderPageTabs();
      renderTree();
    }

    function renderPageTabs() {
      const container = document.getElementById('pageTabs');
      container.innerHTML = treeData.pages.map((page, idx) => `
        <div class="page-tab ${idx === activePageIdx ? 'active' : ''}" onclick="switchPage(${idx})">
          <i class="fa-solid fa-file"></i> ${page.name}
          ${treeData.pages.length > 1 ? `<i class="fa-solid fa-xmark" style="margin-right:auto;font-size:10px;opacity:0.5;" onclick="event.stopPropagation();deletePage(${idx})"></i>` : ''}
        </div>
      `).join('');
    }

    function renderTree() {
      const container = document.getElementById('treeContainer');
      const containers = getActiveContainers();

      if (containers.length === 0) {
        container.innerHTML = '';
        document.getElementById('emptyState').style.display = '';
        document.getElementById('dropZone').classList.remove('has-blocks');
        return;
      }

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('dropZone').classList.add('has-blocks');

      container.innerHTML = containers.map((cont, ci) => `
        <div class="container-block">
          <div class="container-header">
            <span class="block-badge badge-green">محدوده ${ci + 1}</span>
            <span class="block-badge badge-red" onclick="changeLayout(${ci})">${cont.layout === 'grid' ? 'جدولی' : cont.layout === 'list' ? 'لیستی' : 'مختصاتی'}</span>
            <span style="flex:1"></span>
            <button style="background:none;border:none;cursor:pointer;color:var(--red);" onclick="deleteContainer(${ci})"><i class="fa-solid fa-trash-can"></i></button>
          </div>
          ${cont.rows.map((row, ri) => `
            <div class="tree-row">
              <div class="connector-v" style="align-self:stretch;"></div>
              <div class="node-badge badge-blue" onclick="openEditModal(${ci},${ri},'script')">
                <button class="node-delete" onclick="event.stopPropagation();deleteRow(${ci},${ri})"><i class="fa-solid fa-xmark"></i></button>
                <i class="fa-solid fa-code"></i> ${row.script.type || 'اسکریپت'}
              </div>
              <div class="connector-h"></div>
              <div class="node-badge badge-violet" onclick="openEditModal(${ci},${ri},'resource')">
                <i class="fa-solid fa-icons"></i> منابع
              </div>
              <div class="connector-h"></div>
              <div class="node-badge badge-yellow" onclick="openEditModal(${ci},${ri},'visual')">
                <i class="fa-solid fa-palette"></i> ${row.visual.content?.substring(0, 15) || 'ظاهری'}
              </div>
              <div class="connector-v" style="align-self:stretch;"></div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (tab === 'code') generateCode();
      if (tab === 'preview') updatePreview();
    }

    function generateCode() {
      let fullHTML = '';
      
      treeData.pages.forEach((page, pageIdx) => {
        let html = '<!DOCTYPE html>\n<html lang="fa" dir="rtl">\n<head>\n';
        html += '<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n';
        html += '<title>' + page.name + ' - BlockWeb</title>\n';
        html += '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">\n';
        html += '<style>\n  *{margin:0;padding:0;box-sizing:border-box}\n  body{font-family:sans-serif}\n';
        if (wizardSettings) {
          html += `  body{background:${wizardSettings.color2 || '#f8fafc'};color:${wizardSettings.color3 || '#0f172a'}}\n`;
        }
        html += '</style>\n</head>\n<body>\n';

        if (wizardSettings && wizardSettings.header === 'yes') {
          html += '  <header style="background:' + (wizardSettings.color1 || '#6366f1') + ';padding:16px;color:#fff">Header</header>\n';
        }

        html += '  <main style="padding:16px">\n';
        
        page.containers.forEach(cont => {
          html += '    <div style="';
          if (cont.layout === 'grid') html += 'display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;';
          else if (cont.layout === 'list') html += 'display:flex;flex-direction:column;gap:8px;';
          html += '">\n';
          
          cont.rows.forEach(row => {
            html += generateRowHTML(row);
          });
          
          html += '    </div>\n';
        });

        html += '  </main>\n';

        if (wizardSettings && wizardSettings.footer !== '1') {
          html += '  <footer style="background:' + (wizardSettings.color1 || '#6366f1') + ';padding:16px;color:#fff;text-align:center">Footer</footer>\n';
        }

        html += '</body>\n</html>';
        
        fullHTML += '<!-- ' + page.name + ' -->\n' + html + '\n\n';
      });

      document.getElementById('codeOutput').textContent = fullHTML;
    }

    function generateRowHTML(row) {
      let html = '';
      if (row.resource.icon) {
        html += `<i class="fa-solid ${row.resource.icon}" style="color:${row.resource.color};font-size:24px;"></i>\n`;
      }
      if (row.resource.image) {
        html += `<img src="${row.resource.image}" style="max-width:100%;">\n`;
      }
      
      const style = row.visual.style || {};
      const content = row.visual.content || '';
      
      if (row.script.type === 'heading') {
        html += `<h2 style="font-size:${style.fontSize};text-align:${style.textAlign}">${content}</h2>\n`;
      } else if (row.script.type === 'button') {
        const link = row.script.link || '#';
        html += `<a href="${link}"><button style="font-size:${style.fontSize};padding:10px 20px;background:${row.resource.color};color:#fff;border:none;border-radius:8px;cursor:pointer;">${content || 'کلیک'}</button></a>\n`;
      } else if (row.script.type === 'card') {
        html += `<div style="font-size:${style.fontSize};text-align:${style.textAlign};padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">${content}</div>\n`;
      } else {
        html += `<p style="font-size:${style.fontSize};text-align:${style.textAlign}">${content}</p>\n`;
      }
      
      return html;
    }

    function updatePreview() {
      generateCode();
      document.getElementById('previewFrame').srcdoc = document.getElementById('codeOutput').textContent;
    }

    async function saveBlocks() {
      if (!projectId) return;
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'saveProjectBlocks', projectId: projectId, blocks: JSON.stringify(treeData) })
        });
        alert('ذخیره شد.');
      } catch (e) { alert('خطا در ذخیره‌سازی.'); }
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    (async function init() {
      new BlockWebApp();
      currentUser = checkSession();
      if (!currentUser) { window.location.href = '../login.html'; return; }
      
      const params = getQueryParams();
      domainName = params.domain;
      if (!domainName) { window.location.href = '../dashboard.html'; return; }

      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getProjectByDomain', domain: domainName }) });
        const data = await res.json();
        if (data && data.success) {
          projectId = data.projectId;
          if (data.settings && data.settings !== '') {
            wizardSettings = JSON.parse(data.settings);
          }
          if (data.blocks && data.blocks !== '') {
            treeData = JSON.parse(data.blocks);
            if (!treeData.pages) treeData = { pages: [{ id: 'pg_1', name: 'صفحه اصلی', containers: [] }] };
            renderAll();
          }
        }
      } catch (e) {}
      
      renderAll();
    })();
  </script>

</body>
