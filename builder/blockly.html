<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockWeb | بلوک‌ها</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e2e8f0;
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
      --dark: #0f172a; --text: #334155; --text-light: #94a3b8;
      --white: #ffffff; --red: #f43f5e; --green: #10b981;
      --orange: #f59e0b; --purple: #a855f7;
      --yellow: #eab308; --blue: #3b82f6; --violet: #8b5cf6; --amber: #f97316;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .header {
      background: var(--white); box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 10px 16px; border-bottom: 1px solid var(--bg3);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; gap: 8px;
    }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .header-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .header-logo i { font-size: 16px; color: #fff; }
    .header-title { font-size: 16px; font-weight: 700; color: var(--dark); }
    .header-btns { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .btn-h {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600; text-decoration: none;
      padding: 6px 10px; border-radius: 6px;
      transition: all 0.2s ease; white-space: nowrap;
      font-family: inherit; cursor: pointer; border: none;
    }
    .btn-save { background: var(--green); color: #fff; }
    .btn-download { background: var(--amber); color: #fff; }
    .btn-exit { background: none; color: var(--text); border: 1.5px solid var(--bg3); }
    .btn-exit:hover { background: var(--bg2); }

    .tab-buttons {
      display: flex; justify-content: center; padding: 6px 0;
      background: var(--white); border-bottom: 1px solid var(--bg3);
    }
    .tab-btn {
      padding: 8px 14px; font-size: 11px; font-weight: 600;
      background: none; border: none; color: var(--text-light);
      cursor: pointer; font-family: inherit; transition: all 0.2s;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .tab-btn.active { background: var(--primary); color: #fff; border-radius: 8px; }
    .tab-btn:hover:not(.active):not(.locked) { color: var(--primary-dark); }
    .tab-btn.locked { opacity: 0.5; cursor: not-allowed; }

    .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .tab-content { display: none; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; }

    .builder-layout { flex: 1; display: flex; overflow: hidden; }

    .pages-panel {
      width: 180px; background: var(--white); border-left: 1px solid var(--bg3);
      overflow-y: auto; padding: 10px; flex-shrink: 0;
      display: flex; flex-direction: column;
    }
    .pages-panel h4 { font-size: 10px; color: var(--text-light); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .page-tab {
      padding: 7px 9px; border-radius: 7px; margin-bottom: 2px;
      cursor: pointer; font-size: 10px; font-weight: 600;
      color: var(--text); transition: all 0.2s;
      display: flex; align-items: center; gap: 5px;
      border: 1.5px solid transparent;
    }
    .page-tab:hover { background: var(--bg2); }
    .page-tab.active { background: #eef2ff; border-color: var(--primary); color: var(--primary); }
    .page-tab i { font-size: 10px; }
    .btn-add-page {
      width: 100%; padding: 7px; border-radius: 7px; margin-top: 6px;
      font-size: 10px; font-weight: 600; cursor: pointer;
      font-family: inherit; background: none; color: var(--primary);
      border: 1.5px dashed var(--primary-light);
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn-add-page:hover { background: #eef2ff; }
    .btn-add-container {
      width: 100%; padding: 8px; border-radius: 7px; margin-top: 4px;
      font-size: 10px; font-weight: 600; cursor: pointer;
      font-family: inherit; background: var(--green); color: #fff; border: none;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    .canvas-area {
      flex: 1; overflow-y: auto; padding: 14px;
      background: var(--bg2);
    }
    .canvas-area::-webkit-scrollbar { width: 5px; }
    .canvas-area::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 8px; }

    .page-settings-bar {
      background: var(--white); border-radius: 10px; padding: 10px 14px;
      margin-bottom: 10px; border: 1px solid var(--bg3);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .page-settings-bar label { font-size: 9px; font-weight: 600; color: var(--text-light); }
    .page-settings-bar input[type="color"] { width: 28px; height: 24px; border: none; cursor: pointer; border-radius: 5px; }
    .page-settings-bar select { padding: 4px 6px; border: 1px solid var(--bg3); border-radius: 5px; font-size: 9px; font-family: inherit; }
    .setting-group { display: flex; align-items: center; gap: 3px; }

    .drop-zone {
      min-height: 250px; border: 2px dashed var(--bg3); border-radius: 14px;
      padding: 14px; transition: all 0.3s;
    }
    .drop-zone.has-blocks { border-style: solid; }

    .empty-state {
      text-align: center; padding: 30px 16px; color: var(--text-light);
    }
    .empty-state i { font-size: 36px; margin-bottom: 8px; display: block; color: var(--bg3); }

    .container-block {
      background: var(--white); border-radius: 12px; margin-bottom: 10px;
      border: 1px solid var(--bg3); overflow: hidden;
    }
    .container-header {
      display: flex; align-items: center; gap: 6px; padding: 7px 10px;
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
    }
    .block-badge {
      padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; color: #fff;
    }
    .badge-green { background: var(--green); }
    .badge-red { background: var(--red); cursor: pointer; }
    .badge-amber { background: var(--amber); }

    .btn-add-row {
      background: none; border: 1px dashed var(--green); color: var(--green);
      padding: 4px 8px; border-radius: 5px; font-size: 9px; cursor: pointer;
      font-family: inherit; margin-right: 4px;
    }

    .tree-row {
      display: flex; align-items: center; padding: 5px 10px;
      border-top: 1px solid var(--bg2); gap: 0; position: relative;
      min-height: 40px;
    }
    .node-badge {
      padding: 6px 10px; border-radius: 6px; font-size: 9px; font-weight: 600;
      color: #fff; cursor: pointer; position: relative; white-space: nowrap;
      transition: all 0.2s; flex-shrink: 0;
    }
    .node-badge:hover { filter: brightness(1.1); }
    .node-badge i { font-size: 9px; }
    .badge-yellow { background: var(--yellow); color: #0f172a; }
    .badge-blue { background: var(--blue); }
    .badge-violet { background: var(--violet); }
    .badge-orange { background: var(--amber); }

    .node-delete {
      position: absolute; top: -4px; left: -4px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--red); color: #fff; border: none;
      cursor: pointer; font-size: 7px; display: none;
      align-items: center; justify-content: center; z-index: 10;
    }
    .node-badge:hover .node-delete { display: flex; }

    .connector-h { width: 16px; height: 2px; background: var(--bg3); flex-shrink: 0; }
    .connector-v { width: 2px; background: var(--bg3); flex-shrink: 0; }

    .code-panels { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; padding: 10px; }
    .code-panel {
      background: var(--white); border-radius: 10px; border: 1px solid var(--bg3); overflow: hidden;
    }
    .code-panel-header {
      padding: 8px 12px; background: var(--bg2); font-size: 10px; font-weight: 700;
      display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--bg3);
    }
    .code-panel-body {
      background: #1e293b; color: #e2e8f0; padding: 10px; font-family: 'Courier New', monospace;
      font-size: 10px; white-space: pre-wrap; max-height: 200px; overflow-y: auto;
      direction: ltr; text-align: left;
    }
    .preview-frame {
      width: 100%; height: 100%; border: none; border-radius: 12px; background: #fff;
    }
    .preview-locked {
      display: flex; align-items: center; justify-content: center;
      flex: 1; text-align: center; color: var(--text-light);
    }
    .preview-locked i { font-size: 48px; color: var(--bg3); margin-bottom: 10px; display: block; }

    .ad-banner {
      background: linear-gradient(135deg, #fef2f2, #fff);
      border: 1px dashed var(--red); border-radius: 8px;
      padding: 8px 12px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .ad-banner img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; }
    .ad-banner span { font-size: 10px; font-weight: 600; color: var(--red); }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: center; justify-content: center; padding: 14px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white); border-radius: 14px;
      width: 100%; max-width: 440px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .modal-header {
      padding: 12px 16px; border-bottom: 1px solid var(--bg3);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 13px; color: var(--dark); }
    .modal-close { background: none; border: none; font-size: 14px; color: var(--text-light); cursor: pointer; }
    .modal-body { padding: 12px 16px; }
    .form-group { margin-bottom: 8px; }
    .form-group label { display: block; font-size: 9px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 7px 9px; border: 1.5px solid(var(--bg3)); border-radius: 6px;
      font-size: 10px; color: var(--dark); background: var(--bg);
      outline: none; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .btn-apply {
      width: 100%; padding: 9px; background: var(--primary); color: #fff;
      border: none; border-radius: 7px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 4px;
    }
    .lock-badge {
      display: inline-flex; align-items: center; gap: 2px;
      font-size: 8px; color: #065f46; background: #d1fae5;
      padding: 2px 6px; border-radius: 5px;
    }
    .lock-badge i { font-size: 7px; }

    @media (max-width: 768px) {
      .header { padding: 8px 10px; }
      .header-title { font-size: 14px; }
      .btn-h { font-size: 9px; padding: 5px 8px; }
      .tab-btn { font-size: 9px; padding: 6px 10px; }
      .builder-layout { flex-direction: column-reverse; }
      .pages-panel {
        width: 100%; border-left: none; border-top: 1px solid var(--bg3);
        flex-direction: row; overflow-x: auto; gap: 4px; padding: 6px;
        flex-shrink: 0; max-height: 100px; flex-wrap: nowrap;
      }
      .pages-panel h4, .pages-panel .btn-add-page, .pages-panel .btn-add-container { display: none; }
      .page-tab { flex-shrink: 0; white-space: nowrap; font-size: 9px; padding: 5px 7px; }
      .canvas-area { padding: 8px; }
      .page-settings-bar { gap: 4px; }
      .container-header { flex-wrap: wrap; gap: 4px; }
      .tree-row { flex-wrap: wrap; gap: 3px; padding: 4px 8px; }
      .node-badge { font-size: 8px; padding: 5px 8px; }
      .code-panel-body { font-size: 9px; max-height: 150px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-right">
      <div class="header-logo"><i class="fa-solid fa-cubes"></i></div>
      <span class="header-title">BlockWeb Builder</span>
    </div>
    <div class="header-btns">
      <button class="btn-h btn-save" onclick="saveB()"><i class="fa-solid fa-save"></i> ذخیره</button>
      <button class="btn-h btn-download" onclick="dlAll()"><i class="fa-solid fa-download"></i> دانلود</button>
      <a href="../dashboard.html" class="btn-h btn-exit"><i class="fa-solid fa-arrow-right"></i> خروج</a>
    </div>
  </header>

  <div class="tab-buttons">
    <button class="tab-btn active" onclick="swT('blocks')"><i class="fa-solid fa-cubes"></i> بلوک</button>
    <button class="tab-btn" onclick="swT('code')"><i class="fa-solid fa-code"></i> کد</button>
    <button class="tab-btn locked" onclick="swT('preview')"><i class="fa-solid fa-eye"></i> پیش‌نمایش <span class="lock-badge"><i class="fa-solid fa-crown"></i> پرومیوم</span></button>
  </div>

  <div class="main-container">
    
    <div class="tab-content active" id="tab-blocks">
      <div class="builder-layout">

        <div class="canvas-area">
          <a href="https://eitaa.com/Amirmahdi_code" target="_blank" class="ad-banner">
            <img src="https://cdn.imgurl.ir/uploads/m87412_4b5310ee-fa5a-4d2e-a58c-a9337ddb4f92.png" alt="حمایت">
            <span>حمایت از سازنده BlockWeb</span>
          </a>

          <div class="page-settings-bar" id="pageSettingsBar">
            <span style="font-size:9px;font-weight:700;color:var(--dark);"><i class="fa-solid fa-gear"></i> تنظیمات:</span>
            <div class="setting-group"><label>هدر</label><input type="color" id="psHeaderColor" value="#6366f1" onchange="ups('hc', this.value)"></div>
            <div class="setting-group"><label>بادی</label><input type="color" id="psBodyColor" value="#f8fafc" onchange="ups('bc', this.value)"></div>
            <div class="setting-group"><label>فوتر</label><input type="color" id="psFooterColor" value="#1e293b" onchange="ups('fc', this.value)"></div>
            <div class="setting-group"><label>انیمیشن</label><select id="psAnimation" onchange="ups('an', this.value)">
              <option value="">بدون</option><option value="fade">محو</option><option value="slide">اسلاید</option>
            </select></div>
          </div>

          <div class="drop-zone" id="dropZone">
            <div class="empty-state" id="emptyState">
              <i class="fa-solid fa-cubes"></i>
              <p>از پنل سمت راست یک محدوده اضافه کنید</p>
            </div>
            <div id="treeContainer"></div>
          </div>
        </div>

        <div class="pages-panel" id="pagesPanel">
          <h4><i class="fa-solid fa-files"></i> صفحات</h4>
          <div id="pageTabs" style="flex:1;overflow-y:auto;"></div>
          <button class="btn-add-page" onclick="addPage()"><i class="fa-solid fa-plus"></i> صفحه جدید</button>
          <button class="btn-add-container" onclick="addC()"><i class="fa-solid fa-square-plus"></i> محدوده جدید</button>
        </div>

      </div>
    </div>

    <div class="tab-content" id="tab-code">
      <div class="code-panels" id="codePanels"></div>
    </div>

    <div class="tab-content" id="tab-preview">
      <div class="preview-locked" id="previewLocked">
        <i class="fa-solid fa-crown"></i>
        <p>پیش‌نمایش مخصوص کاربران پرومیوم است</p>
      </div>
      <iframe class="preview-frame" id="previewFrame" style="display:none;"></iframe>
    </div>

  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">ویرایش بلوک</h3>
        <button class="modal-close" onclick="closeM()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbxNtG79HTd2nfld3Hd1wdUyumvGqsQgE7nrog6F6xpdB7RkYx8Zl_tGlxvMMozaoQT3/exec';
    const SESS = 10800000;
    let pid = null, domain = null, user = null, wiz = null, isPrem = false;
    let data = { pages: [{ id: 'pg_1', name: 'صفحه اصلی', conts: [], ps: { hc: '#6366f1', bc: '#f8fafc', fc: '#1e293b', an: '' } }] };
    let ap = 0, edit = null;

    class App { constructor() { this.w = window.Eitaa?.WebApp; if (this.w) { this.w.ready(); this.w.expand(); } } }

    function sess() { try { let s = JSON.parse(localStorage.getItem('blockweb_session')); if (Date.now() - s.timestamp > SESS) { localStorage.removeItem('blockweb_session'); return null; } return s.user; } catch (e) { return null; } }

    function GP() { return data.pages[ap]; }
    function GC() { return GP().conts; }

    function addPage() { let n = prompt('نام صفحه:'); if (!n) return; data.pages.push({ id: 'pg_' + Date.now(), name: n, conts: [], ps: { hc: '#6366f1', bc: '#f8fafc', fc: '#1e293b', an: '' } }); ap = data.pages.length - 1; RA(); }
    function swP(idx) { ap = idx; RA(); }
    function delP(idx) { if (data.pages.length <= 1) return; if (!confirm('حذف؟')) return; data.pages.splice(idx, 1); if (ap >= data.pages.length) ap = data.pages.length - 1; RA(); }

    function addC() { GC().push({ id: 'c_' + Date.now(), layout: 'grid', rows: [] }); RA(); }
    function addR(ci) { let c = GC()[ci]; if (!c) return; c.rows.push({ id: 'r_' + Date.now(), vis: { txt: 'متن اینجا', st: { fs: '16px', ta: 'right' } }, scr: { tp: 'heading', an: '', lk: '' }, res: { cl: '#6366f1', ic: '', im: '', sd: '' } }); RA(); }
    function addSt(ci) { let c = GC()[ci]; if (!c) return; c.rows.push({ id: 'r_' + Date.now(), vis: { txt: 'فرم ذخیره', st: { fs: '16px', ta: 'right' } }, scr: { tp: 'button', an: '', lk: '' }, res: { cl: '#f97316', ic: 'fa-database', im: '', sd: '' }, stg: { api: '', sh: 'Sheet1', col: 'name,email' } }); RA(); }
    function delC(ci) { if (!confirm('حذف؟')) return; GC().splice(ci, 1); RA(); }
    function delR(ci, ri) { if (!confirm('حذف؟')) return; GC()[ci].rows.splice(ri, 1); RA(); }
    function chL(ci) { let c = GC()[ci]; let opts = ['grid', 'list', 'custom']; c.layout = opts[(opts.indexOf(c.layout) + 1) % opts.length]; RA(); }
    function ups(key, val) { GP().ps[key] = val; }

    function openM(ci, ri, part) {
      let row = GC()[ci].rows[ri]; edit = { ci, ri, part };
      let m = document.getElementById('editModal'), t = '', b = '';
      if (part === 'vis') {
        t = 'بلوک زرد'; b = `<div class="form-group"><label>متن</label><textarea id="ef1" rows="3">${row.vis.txt||''}</textarea></div><div class="form-group"><label>فونت</label><input id="ef2" value="${row.vis.st?.fs||'16px'}"></div><div class="form-group"><label>چینش</label><select id="ef3"><option value="right" ${row.vis.st?.ta==='right'?'selected':''}>راست</option><option value="center" ${row.vis.st?.ta==='center'?'selected':''}>وسط</option><option value="left" ${row.vis.st?.ta==='left'?'selected':''}>چپ</option></select></div>`;
      } else if (part === 'scr') {
        t = 'بلوک آبی'; b = `<div class="form-group"><label>نوع</label><select id="ef1"><option value="heading" ${row.scr.tp==='heading'?'selected':''}>عنوان</option><option value="button" ${row.scr.tp==='button'?'selected':''}>دکمه</option><option value="card" ${row.scr.tp==='card'?'selected':''}>کارت</option><option value="text" ${row.scr.tp==='text'?'selected':''}>متن</option></select></div><div class="form-group"><label>لینک</label><input id="ef2" value="${row.scr.lk||''}"></div><div class="form-group"><label>انیمیشن</label><select id="ef3"><option value="" ${!row.scr.an?'selected':''}>بدون</option><option value="fade" ${row.scr.an==='fade'?'selected':''}>محو</option><option value="slide" ${row.scr.an==='slide'?'selected':''}>اسلاید</option></select></div>`;
      } else if (part === 'res') {
        t = 'بلوک بنفش'; b = `<div class="form-group"><label>رنگ</label><input type="color" id="ef1" value="${row.res.cl||'#6366f1'}"></div><div class="form-group"><label>آیکون</label><input id="ef2" value="${row.res.ic||''}" placeholder="fa-star"></div><div class="form-group"><label>تصویر</label><input id="ef3" value="${row.res.im||''}"></div><div class="form-group"><label>صوت</label><input id="ef4" value="${row.res.sd||''}"></div>`;
      } else if (part === 'stg') {
        t = 'بلوک نارنجی'; let st = row.stg || { api: '', sh: 'Sheet1', col: 'name,email' };
        b = `<div class="form-group"><label>لینک Apps Script</label><input id="ef1" value="${st.api||''}"></div><div class="form-group"><label>شیت</label><input id="ef2" value="${st.sh||'Sheet1'}"></div><div class="form-group"><label>ستون‌ها</label><input id="ef3" value="${st.col||'name,email'}"></div><div style="font-size:9px;color:var(--text-light);margin-top:4px;background:#fef3c7;padding:8px;border-radius:6px;"><strong>راهنما:</strong> به script.google.com بروید و Web App را deploy کنید.</div>`;
      }
      document.getElementById('modalTitle').textContent = t;
      document.getElementById('modalBody').innerHTML = b + '<button class="btn-apply" onclick="applyM()">اعمال</button>';
      m.classList.add('active');
    }

    function applyM() {
      if (!edit) return; let { ci, ri, part } = edit; let row = GC()[ci].rows[ri];
      if (part === 'vis') { row.vis.txt = document.getElementById('ef1')?.value || ''; row.vis.st = { fs: document.getElementById('ef2')?.value || '16px', ta: document.getElementById('ef3')?.value || 'right' }; }
      else if (part === 'scr') { row.scr.tp = document.getElementById('ef1')?.value || 'heading'; row.scr.an = document.getElementById('ef3')?.value || ''; row.scr.lk = document.getElementById('ef2')?.value || ''; }
      else if (part === 'res') { row.res.cl = document.getElementById('ef1')?.value || '#6366f1'; row.res.ic = document.getElementById('ef2')?.value || ''; row.res.im = document.getElementById('ef3')?.value || ''; row.res.sd = document.getElementById('ef4')?.value || ''; }
      else if (part === 'stg') { if (!row.stg) row.stg = {}; row.stg.api = document.getElementById('ef1')?.value || ''; row.stg.sh = document.getElementById('ef2')?.value || 'Sheet1'; row.stg.col = document.getElementById('ef3')?.value || 'name,email'; }
      closeM(); RA();
    }

    function closeM() { document.getElementById('editModal').classList.remove('active'); edit = null; }
    function RA() { RP(); RT(); LP(); }
    function RP() { document.getElementById('pageTabs').innerHTML = data.pages.map((p, i) => `<div class="page-tab ${i===ap?'active':''}" onclick="swP(${i})"><i class="fa-solid fa-file"></i> ${p.name}${data.pages.length>1?`<i class="fa-solid fa-xmark" style="margin-right:auto;font-size:9px;opacity:0.5;" onclick="event.stopPropagation();delP(${i})"></i>`:''}</div>`).join(''); }
    function LP() { let ps = GP().ps || {}; document.getElementById('psHeaderColor').value = ps.hc || '#6366f1'; document.getElementById('psBodyColor').value = ps.bc || '#f8fafc'; document.getElementById('psFooterColor').value = ps.fc || '#1e293b'; document.getElementById('psAnimation').value = ps.an || ''; }

    function RT() {
      let conts = GC(), ctr = document.getElementById('treeContainer');
      if (conts.length === 0) { ctr.innerHTML = ''; document.getElementById('emptyState').style.display = ''; document.getElementById('dropZone').classList.remove('has-blocks'); return; }
      document.getElementById('emptyState').style.display = 'none'; document.getElementById('dropZone').classList.add('has-blocks');
      ctr.innerHTML = conts.map((c, ci) => `<div class="container-block"><div class="container-header"><span class="block-badge badge-green">محدوده ${ci+1}</span><span class="block-badge badge-red" onclick="chL(${ci})">${c.layout==='grid'?'جدولی':c.layout==='list'?'لیستی':'مختصاتی'}</span><button class="btn-add-row" onclick="addR(${ci})"><i class="fa-solid fa-plus"></i> ردیف</button><button class="btn-add-row" style="border-color:var(--amber);color:var(--amber);" onclick="addSt(${ci})"><i class="fa-solid fa-database"></i> ذخیره</button><button style="background:none;border:none;cursor:pointer;color:var(--red);margin-right:auto;" onclick="delC(${ci})"><i class="fa-solid fa-trash-can"></i></button></div>${c.rows.map((r, ri) => `<div class="tree-row"><div class="connector-v" style="align-self:stretch;"></div><div class="node-badge ${r.stg?'badge-orange':'badge-blue'}" onclick="openM(${ci},${ri},'${r.stg?'stg':'scr'}')"><button class="node-delete" onclick="event.stopPropagation();delR(${ci},${ri})"><i class="fa-solid fa-xmark"></i></button><i class="fa-solid ${r.stg?'fa-database':'fa-code'}"></i> ${r.stg?'ذخیره':r.scr.tp||'اسکریپت'}</div><div class="connector-h"></div><div class="node-badge badge-violet" onclick="openM(${ci},${ri},'res')"><i class="fa-solid fa-icons"></i> منابع</div><div class="connector-h"></div><div class="node-badge badge-yellow" onclick="openM(${ci},${ri},'vis')"><i class="fa-solid fa-palette"></i> ${r.vis.txt?.substring(0,15)||'ظاهری'}</div><div class="connector-v" style="align-self:stretch;"></div></div>`).join('')}</div>`).join('');
    }

    function swT(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
      if (tab === 'preview' && !isPrem) return;
      document.getElementById('tab-' + tab).classList.add('active'); event.currentTarget.classList.add('active');
      if (tab === 'code') genCP(); if (tab === 'preview') upPV();
    }

    function genCP() {
      let ctr = document.getElementById('codePanels'), h = '';
      data.pages.forEach(p => { let c = genPC(p); h += `<div class="code-panel"><div class="code-panel-header"><i class="fa-solid fa-file-code"></i> ${p.name} — HTML</div><div class="code-panel-body">${esc(c.html)}</div></div><div class="code-panel"><div class="code-panel-header"><i class="fa-solid fa-paintbrush"></i> ${p.name} — CSS</div><div class="code-panel-body">${esc(c.css)}</div></div><div class="code-panel"><div class="code-panel-header"><i class="fa-solid fa-gear"></i> ${p.name} — JS</div><div class="code-panel-body">${esc(c.js)}</div></div>`; });
      ctr.innerHTML = h;
    }

    function genPC(p) {
      let ps = p.ps || {}, css = '*{margin:0;padding:0;box-sizing:border-box}\nbody{font-family:sans-serif;background:' + (ps.bc || '#f8fafc') + ';color:#0f172a;' + (ps.an === 'fade' ? 'animation:fadeIn 1s ease;' : ps.an === 'slide' ? 'animation:slideIn 1s ease;' : '') + '}\n@keyframes fadeIn{from{opacity:0}to{opacity:1}}\n@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}\n';
      let html = '<!DOCTYPE html>\n<html lang="fa" dir="rtl">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>' + p.name + '</title>\n<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">\n<link rel="stylesheet" href="style.css">\n</head>\n<body>\n';
      if (wiz && wiz.header === 'yes') html += '<header style="background:' + (ps.hc || '#6366f1') + ';padding:16px;color:#fff"><div style="max-width:1100px;margin:0 auto"><h1>' + (wiz.headerText || 'سایت من') + '</h1></div></header>\n';
      html += '<main style="max-width:1100px;margin:0 auto;padding:16px">\n';
      p.conts.forEach(c => {
        html += '<div style="' + (c.layout === 'grid' ? 'display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;' : c.layout === 'list' ? 'display:flex;flex-direction:column;gap:8px;' : '') + '">\n';
        c.rows.forEach(r => {
          if (r.res.ic) html += '<i class="fa-solid ' + r.res.ic + '" style="color:' + r.res.cl + ';font-size:24px;"></i>\n';
          if (r.res.im) html += '<img src="' + r.res.im + '" style="max-width:100%;">\n';
          let st = r.vis.st || {}, txt = r.vis.txt || '';
          if (r.stg) {
            html += '<form onsubmit="handleSubmit(event)" style="display:flex;flex-direction:column;gap:8px;max-width:400px;">\n';
            (r.stg.col || 'name,email').split(',').forEach(col => { html += '<input name="' + col.trim() + '" placeholder="' + col.trim() + '" style="padding:8px;border:1px solid #ddd;border-radius:6px;">\n'; });
            html += '<button type="submit" style="padding:10px;background:' + r.res.cl + ';color:#fff;border:none;border-radius:6px;">ارسال</button>\n</form>\n';
          } else if (r.scr.tp === 'heading') html += '<h2 style="font-size:' + st.fs + ';text-align:' + st.ta + '">' + txt + '</h2>\n';
          else if (r.scr.tp === 'button') html += '<a href="' + (r.scr.lk || '#') + '"><button style="font-size:' + st.fs + ';padding:10px 20px;background:' + r.res.cl + ';color:#fff;border:none;border-radius:8px;">' + (txt || 'کلیک') + '</button></a>\n';
          else if (r.scr.tp === 'card') html += '<div style="font-size:' + st.fs + ';text-align:' + st.ta + ';padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">' + txt + '</div>\n';
          else html += '<p style="font-size:' + st.fs + ';text-align:' + st.ta + '">' + txt + '</p>\n';
        });
        html += '</div>\n';
      });
      html += '</main>\n<a href="https://eitaa.com/Amirmahdi_code" target="_blank" style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:#fef2f2;border-top:1px dashed #f43f5e;text-decoration:none;color:#f43f5e;font-size:12px;justify-content:center;"><img src="https://cdn.imgurl.ir/uploads/m87412_4b5310ee-fa5a-4d2e-a58c-a9337ddb4f92.png" style="width:32px;height:32px;border-radius:6px;"> حمایت از سازنده BlockWeb</a>\n';
      if (wiz && wiz.footer !== '1') html += '<footer style="background:' + (ps.fc || '#1e293b') + ';padding:16px;color:#fff;text-align:center;margin-top:20px"><p style="opacity:0.5;font-size:12px;">ساخته شده با BlockWeb</p></footer>\n';
      html += '<script src="script.js"><\/script>\n</body>\n</html>';
      let js = ''; let srs = []; p.conts.forEach(c => { c.rows.forEach(r => { if (r.stg) srs.push(r); }); });
      if (srs.length > 0) { js += 'async function handleSubmit(e){e.preventDefault();let d={};e.target.querySelectorAll("input").forEach(i=>{d[i.name]=i.value});try{'; srs.forEach((r, i) => { js += (i > 0 ? '// یا ' : '') + 'await fetch("' + (r.stg.api || '') + '",{method:"POST",body:JSON.stringify(d)});\n'; }); js += 'alert("ثبت شد.")}catch(e){alert("خطا")}}\n'; }
      return { html, css, js };
    }

    function esc(t) { return t.replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function upPV() { if (!isPrem) return; let c = genPC(GP()); document.getElementById('previewFrame').srcdoc = c.html.replace('<link rel="stylesheet" href="style.css">', '<style>' + c.css + '</style>').replace('<script src="script.js"></script>', '<script>' + c.js + '<\/script>'); }

    function dlAll() { data.pages.forEach((p, i) => { let c = genPC(p), pf = i === 0 ? 'index' : p.name.replace(/\s/g, '_'); dlF(pf + '.html', c.html); dlF(pf + '.css', c.css); if (c.js.trim()) dlF(pf + '.js', c.js); }); }
    function dlF(fn, ct) { let b = new Blob([ct], { type: 'text/plain' }), u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = fn; a.click(); URL.revokeObjectURL(u); }

    async function saveB() { if (!pid) return; try { await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'saveProjectBlocks', projectId: pid, blocks: JSON.stringify(data) }) }); alert('ذخیره شد.'); } catch (e) { alert('خطا.'); } }

    document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeM(); });

    (async function() {
      new App(); user = sess(); if (!user) { window.location.href = '../login.html'; return; }
      isPrem = user.userType === 'owner' || user.userType === 'vip' || (user.purchasedPlans && user.purchasedPlans.some(p => p !== 'plan_free'));
      domain = new URLSearchParams(window.location.search).get('domain');
      if (!domain) { window.location.href = '../dashboard.html'; return; }
      try {
        let r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getProjectByDomain', domain }) });
        let d = await r.json();
        if (d && d.success) {
          pid = d.projectId;
          if (d.settings && d.settings !== '') {
            wiz = JSON.parse(d.settings);
            if (wiz.support === 'yes' && !data.pages.some(p => p.name === 'پشتیبانی')) {
              data.pages.push({ id: 'pg_support', name: 'پشتیبانی', conts: [{ id: 'c_support', layout: 'list', rows: [{ id: 'r_support', vis: { txt: 'پشتیبانی آنلاین', st: { fs: '18px', ta: 'center' } }, scr: { tp: 'heading', an: 'fade', lk: '' }, res: { cl: '#6366f1', ic: 'fa-headset', im: '', sd: '' } }] }], ps: { hc: '#6366f1', bc: '#f8fafc', fc: '#1e293b', an: 'fade' } });
            }
          }
          if (d.blocks && d.blocks !== '') { try { data = JSON.parse(d.blocks); if (!data.pages) data = { pages: [{ id: 'pg_1', name: 'صفحه اصلی', conts: [], ps: { hc: '#6366f1', bc: '#f8fafc', fc: '#1e293b', an: '' } }] }; } catch (e) {} }
        }
      } catch (e) {}
      if (isPrem) { document.getElementById('previewLocked').style.display = 'none'; document.getElementById('previewFrame').style.display = ''; document.querySelector('.tab-btn.locked')?.classList.remove('locked'); }
      RA();
    })();
  </script>

</body>
