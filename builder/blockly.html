<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockWeb | بلوک‌ها</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e2e8f0;
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
      --dark: #0f172a; --text: #334155; --text-light: #94a3b8;
      --white: #ffffff; --red: #f43f5e; --green: #10b981;
      --orange: #f59e0b; --purple: #a855f7;
      --yellow: #eab308; --blue: #3b82f6; --violet: #8b5cf6;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .header {
      background: var(--white); box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 10px 16px; border-bottom: 1px solid var(--bg3);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
    }
    .header-logo i { font-size: 18px; color: #fff; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--dark); }
    .header-btns { display: flex; align-items: center; gap: 6px; }
    .header-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; text-decoration: none;
      padding: 6px 11px; border-radius: 7px;
      transition: all 0.2s ease; white-space: nowrap;
      font-family: inherit; cursor: pointer; background: none;
      color: var(--text); border: 1.5px solid var(--bg3);
    }
    .header-btn:hover { background: var(--bg2); }
    .btn-save { background: var(--green); color: #fff; border: none; }
    .btn-save:hover { background: #059669; }
    .btn-preview { background: var(--primary); color: #fff; border: none; }
    .btn-preview:hover { background: var(--primary-dark); }

    .builder-layout { flex: 1; display: flex; overflow: hidden; }

    .toolbox {
      width: 240px; background: var(--white); border-left: 1px solid var(--bg3);
      overflow-y: auto; padding: 12px; flex-shrink: 0;
    }
    .toolbox::-webkit-scrollbar { width: 4px; }
    .toolbox::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 8px; }
    .toolbox h4 {
      font-size: 12px; color: var(--text-light); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .block-item {
      padding: 10px 12px; border-radius: 10px; margin-bottom: 6px;
      cursor: grab; font-size: 12px; font-weight: 600; color: #fff;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s ease; user-select: none;
    }
    .block-item:active { cursor: grabbing; opacity: 0.8; }
    .block-item i { font-size: 13px; }
    .block-green { background: var(--green); }
    .block-red { background: var(--red); }
    .block-yellow { background: var(--yellow); color: #0f172a; }
    .block-blue { background: var(--blue); }
    .block-violet { background: var(--violet); }

    .canvas-area {
      flex: 1; overflow-y: auto; padding: 20px;
      background: var(--bg2); position: relative;
    }
    .canvas-area::-webkit-scrollbar { width: 6px; }
    .canvas-area::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 10px; }

    .drop-zone {
      min-height: 400px; border: 2px dashed var(--bg3); border-radius: 16px;
      padding: 16px; transition: all 0.3s ease;
    }
    .drop-zone.drag-over { border-color: var(--primary); background: #eef2ff; }
    .drop-zone.has-blocks { border-style: solid; border-color: var(--bg3); }

    .tree-block {
      display: flex; align-items: flex-start; gap: 0;
      margin-bottom: 6px; position: relative;
    }
    .tree-children {
      display: flex; flex-direction: column; gap: 4px;
      border-right: 2px solid var(--bg3); margin-right: 12px; padding-right: 10px;
    }
    .tree-node { display: flex; align-items: center; gap: 4px; position: relative; }
    .node-card {
      padding: 10px 14px; border-radius: 10px; font-size: 12px; font-weight: 600;
      color: #fff; display: flex; align-items: center; gap: 8px;
      cursor: pointer; position: relative; min-width: 80px;
      transition: all 0.2s ease;
    }
    .node-card:hover { filter: brightness(1.1); }
    .node-card i { font-size: 12px; }
    .node-green { background: var(--green); }
    .node-red { background: var(--red); }
    .node-yellow { background: var(--yellow); color: #0f172a; }
    .node-blue { background: var(--blue); }
    .node-violet { background: var(--violet); }
    .node-delete {
      position: absolute; top: -8px; left: -8px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--red); color: #fff; border: none;
      cursor: pointer; font-size: 10px; display: none;
      align-items: center; justify-content: center; z-index: 10;
    }
    .node-card:hover .node-delete { display: flex; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-light);
    }
    .empty-state i { font-size: 48px; margin-bottom: 12px; display: block; color: var(--bg3); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .code-output {
      background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 12px;
      font-family: 'Courier New', monospace; font-size: 12px;
      white-space: pre-wrap; max-height: 60vh; overflow-y: auto;
      direction: ltr; text-align: left;
    }
    .preview-frame {
      width: 100%; height: 60vh; border: 1px solid var(--bg3); border-radius: 12px;
      background: #fff;
    }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px;
      width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--bg3);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 15px; color: var(--dark); }
    .modal-close {
      background: none; border: none; font-size: 16px; color: var(--text-light);
      cursor: pointer; padding: 4px;
    }
    .modal-body { padding: 16px 20px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--bg3); border-radius: 8px;
      font-size: 12px; color: var(--dark); background: var(--bg);
      outline: none; font-family: inherit; transition: all 0.3s ease;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99,102,241,0.1);
    }
    .btn-apply {
      width: 100%; padding: 11px; background: var(--primary); color: #fff;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 6px;
    }
    .btn-apply:hover { background: var(--primary-dark); }

    @media (max-width: 768px) {
      .builder-layout { flex-direction: column; }
      .toolbox { width: 100%; border-left: none; border-top: 1px solid var(--bg3); display: flex; flex-wrap: wrap; gap: 6px; }
      .toolbox h4 { display: none; }
      .block-item { flex: 1; min-width: 80px; justify-content: center; font-size: 10px; padding: 8px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-right">
      <div class="header-logo"><i class="fa-solid fa-cubes"></i></div>
      <span class="header-title">BlockWeb Builder</span>
    </div>
    <div class="header-btns">
      <button class="header-btn" onclick="switchTab('blocks')">بلوک‌ها</button>
      <button class="header-btn btn-preview" onclick="switchTab('preview')">پیش‌نمایش</button>
      <button class="header-btn" onclick="switchTab('code')">کد</button>
      <button class="header-btn btn-save" onclick="saveBlocks()">ذخیره</button>
      <a href="../dashboard.html" class="header-btn">خروج</a>
    </div>
  </header>

  <div class="builder-layout">

    <div class="canvas-area">
      <div class="tab-content active" id="tab-blocks">
        <div class="drop-zone" id="dropZone" 
             ondragover="handleDragOver(event)" 
             ondragleave="handleDragLeave(event)" 
             ondrop="handleDrop(event)">
          <div class="empty-state" id="emptyState">
            <i class="fa-solid fa-cubes"></i>
            <p>بلوک‌ها را از سمت چپ بکشید و اینجا رها کنید</p>
          </div>
          <div id="treeContainer"></div>
        </div>
      </div>

      <div class="tab-content" id="tab-preview">
        <iframe class="preview-frame" id="previewFrame"></iframe>
      </div>

      <div class="tab-content" id="tab-code">
        <div class="code-output" id="codeOutput">کد HTML اینجا نمایش داده می‌شود...</div>
      </div>
    </div>

    <div class="toolbox" id="toolbox">
      <h4><i class="fa-solid fa-shapes"></i> بلوک‌ها</h4>
      
      <div class="block-item block-green" draggable="true" data-type="container" ondragstart="dragStart(event)">
        <i class="fa-solid fa-square"></i> محدوده
      </div>
      <div class="block-item block-red" draggable="true" data-type="layout" ondragstart="dragStart(event)">
        <i class="fa-solid fa-table-cells"></i> نوع چیدمان
      </div>
      <div class="block-item block-yellow" draggable="true" data-type="visual" ondragstart="dragStart(event)">
        <i class="fa-solid fa-palette"></i> ظاهری
      </div>
      <div class="block-item block-blue" draggable="true" data-type="script" ondragstart="dragStart(event)">
        <i class="fa-solid fa-code"></i> اسکریپت
      </div>
      <div class="block-item block-violet" draggable="true" data-type="resource" ondragstart="dragStart(event)">
        <i class="fa-solid fa-icons"></i> منابع
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">ویرایش بلوک</h3>
        <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxNtG79HTd2nfld3Hd1wdUyumvGqsQgE7nrog6F6xpdB7RkYx8Zl_tGlxvMMozaoQT3/exec';
    const SESSION_DURATION = 3 * 60 * 60 * 1000;

    let projectId = null;
    let domainName = null;
    let currentUser = null;
    let treeData = { blocks: [] };
    let draggedType = null;
    let editingBlock = null;

    class BlockWebApp {
      constructor() {
        this.webApp = window.Eitaa && window.Eitaa.WebApp ? window.Eitaa.WebApp : null;
        if (this.webApp) { this.webApp.ready(); this.webApp.expand(); }
      }
    }

    function checkSession() {
      const sessionData = localStorage.getItem('blockweb_session');
      if (!sessionData) return null;
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('blockweb_session');
          return null;
        }
        return session.user;
      } catch (e) {
        localStorage.removeItem('blockweb_session');
        return null;
      }
    }

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return { domain: params.get('domain') };
    }

    function dragStart(e) {
      draggedType = e.target.getAttribute('data-type');
      e.dataTransfer.setData('text/plain', draggedType);
      e.dataTransfer.effectAllowed = 'copy';
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      document.getElementById('dropZone').classList.add('drag-over');
    }

    function handleDragLeave(e) {
      document.getElementById('dropZone').classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('drag-over');
      document.getElementById('dropZone').classList.add('has-blocks');
      document.getElementById('emptyState').style.display = 'none';

      if (!draggedType) return;

      const block = createNewBlock(draggedType);
      treeData.blocks.push(block);
      renderTree();
      draggedType = null;
    }

    function createNewBlock(type) {
      const block = {
        id: 'b_' + Date.now(),
        type: type,
        content: '',
        style: {},
        children: []
      };

      switch(type) {
        case 'container': block.content = 'محدوده جدید'; break;
        case 'layout': block.layoutType = 'grid'; block.content = 'چیدمان'; break;
        case 'visual': block.content = 'متن اینجا'; block.style = { fontSize: '16px', textAlign: 'right' }; break;
        case 'script': block.scriptType = 'heading'; block.animation = ''; block.content = 'اسکریپت'; break;
        case 'resource': block.resourceColor = '#6366f1'; block.icon = ''; block.image = ''; block.sound = ''; block.content = 'منابع'; break;
      }
      return block;
    }

    function deleteBlock(blockId) {
      if (!confirm('این بلوک حذف شود؟')) return;
      removeBlockById(treeData.blocks, blockId);
      renderTree();
    }

    function removeBlockById(blocks, id) {
      for (let i = blocks.length - 1; i >= 0; i--) {
        if (blocks[i].id === id) {
          blocks.splice(i, 1);
          return true;
        }
        if (blocks[i].children && removeBlockById(blocks[i].children, id)) {
          return true;
        }
      }
      return false;
    }

    function editBlock(blockId) {
      editingBlock = findBlockById(treeData.blocks, blockId);
      if (!editingBlock) return;
      
      const modal = document.getElementById('editModal');
      const title = document.getElementById('modalTitle');
      const body = document.getElementById('modalBody');
      
      title.textContent = 'ویرایش ' + getBlockLabel(editingBlock);
      
      let html = '';
      
      switch(editingBlock.type) {
        case 'visual':
          html = `
            <div class="form-group"><label>متن</label><textarea id="editContent" rows="3">${editingBlock.content || ''}</textarea></div>
            <div class="form-group"><label>سایز فونت</label><input type="text" id="editFontSize" value="${editingBlock.style?.fontSize || '16px'}"></div>
            <div class="form-group"><label>چینش</label><select id="editTextAlign">
              <option value="right" ${editingBlock.style?.textAlign === 'right' ? 'selected' : ''}>راست‌چین</option>
              <option value="center" ${editingBlock.style?.textAlign === 'center' ? 'selected' : ''}>وسط‌چین</option>
              <option value="left" ${editingBlock.style?.textAlign === 'left' ? 'selected' : ''}>چپ‌چین</option>
            </select></div>`;
          break;
        case 'container':
          html = `<div class="form-group"><label>نام محدوده</label><input type="text" id="editContent" value="${editingBlock.content || ''}"></div>`;
          break;
        case 'layout':
          html = `<div class="form-group"><label>نوع چیدمان</label><select id="editLayoutType">
            <option value="grid" ${editingBlock.layoutType === 'grid' ? 'selected' : ''}>جدولی</option>
            <option value="list" ${editingBlock.layoutType === 'list' ? 'selected' : ''}>لیستی</option>
            <option value="custom" ${editingBlock.layoutType === 'custom' ? 'selected' : ''}>مختصاتی</option>
          </select></div>`;
          break;
        case 'script':
          html = `<div class="form-group"><label>نوع المان</label><select id="editScriptType">
            <option value="heading" ${editingBlock.scriptType === 'heading' ? 'selected' : ''}>عنوان</option>
            <option value="button" ${editingBlock.scriptType === 'button' ? 'selected' : ''}>دکمه</option>
            <option value="card" ${editingBlock.scriptType === 'card' ? 'selected' : ''}>کارت</option>
            <option value="text" ${editingBlock.scriptType === 'text' ? 'selected' : ''}>متن ساده</option>
          </select></div>
          <div class="form-group"><label>انیمیشن</label><select id="editAnimation">
            <option value="" ${!editingBlock.animation ? 'selected' : ''}>بدون انیمیشن</option>
            <option value="fade" ${editingBlock.animation === 'fade' ? 'selected' : ''}>محو شدن</option>
            <option value="slide" ${editingBlock.animation === 'slide' ? 'selected' : ''}>اسلاید</option>
          </select></div>`;
          break;
        case 'resource':
          html = `<div class="form-group"><label>رنگ</label><input type="color" id="editColor" value="${editingBlock.resourceColor || '#6366f1'}"></div>
            <div class="form-group"><label>آیکون</label><input type="text" id="editIcon" value="${editingBlock.icon || ''}" placeholder="fa-star"></div>
            <div class="form-group"><label>لینک تصویر</label><input type="text" id="editImage" value="${editingBlock.image || ''}" placeholder="https://..."></div>
            <div class="form-group"><label>لینک صوت</label><input type="text" id="editSound" value="${editingBlock.sound || ''}" placeholder="https://..."></div>`;
          break;
      }
      
      html += '<button class="btn-apply" onclick="applyEdit()">اعمال تغییرات</button>';
      body.innerHTML = html;
      modal.classList.add('active');
    }

    function applyEdit() {
      if (!editingBlock) return;
      
      switch(editingBlock.type) {
        case 'visual':
          editingBlock.content = document.getElementById('editContent')?.value || '';
          editingBlock.style = {
            fontSize: document.getElementById('editFontSize')?.value || '16px',
            textAlign: document.getElementById('editTextAlign')?.value || 'right'
          };
          break;
        case 'container':
          editingBlock.content = document.getElementById('editContent')?.value || '';
          break;
        case 'layout':
          editingBlock.layoutType = document.getElementById('editLayoutType')?.value || 'grid';
          break;
        case 'script':
          editingBlock.scriptType = document.getElementById('editScriptType')?.value || 'heading';
          editingBlock.animation = document.getElementById('editAnimation')?.value || '';
          break;
        case 'resource':
          editingBlock.resourceColor = document.getElementById('editColor')?.value || '#6366f1';
          editingBlock.icon = document.getElementById('editIcon')?.value || '';
          editingBlock.image = document.getElementById('editImage')?.value || '';
          editingBlock.sound = document.getElementById('editSound')?.value || '';
          break;
      }
      
      closeModal();
      renderTree();
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
      editingBlock = null;
    }

    function findBlockById(blocks, id) {
      for (let block of blocks) {
        if (block.id === id) return block;
        if (block.children) {
          const found = findBlockById(block.children, id);
          if (found) return found;
        }
      }
      return null;
    }

    function renderTree() {
      const container = document.getElementById('treeContainer');
      container.innerHTML = treeData.blocks.map(block => renderBlock(block, 0)).join('');
      
      if (treeData.blocks.length > 0) {
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('dropZone').classList.add('has-blocks');
      } else {
        document.getElementById('emptyState').style.display = '';
        document.getElementById('dropZone').classList.remove('has-blocks');
      }
    }

    function renderBlock(block, level) {
      const colors = {
        container: 'node-green', layout: 'node-red',
        visual: 'node-yellow', script: 'node-blue', resource: 'node-violet'
      };
      const icons = {
        container: 'fa-square', layout: 'fa-table-cells',
        visual: 'fa-palette', script: 'fa-code', resource: 'fa-icons'
      };

      let html = `<div class="tree-block" style="margin-right:${level * 16}px">
        <div class="tree-node">
          <div class="node-card ${colors[block.type] || 'node-blue'}" 
               onclick="editBlock('${block.id}')"
               draggable="true"
               ondragstart="event.stopPropagation(); dragStartBlock('${block.id}')">
            <button class="node-delete" onclick="event.stopPropagation(); deleteBlock('${block.id}')">
              <i class="fa-solid fa-xmark"></i>
            </button>
            <i class="fa-solid ${icons[block.type] || 'fa-cube'}"></i>
            ${getBlockLabel(block)}
          </div>`;

      if (block.children && block.children.length > 0) {
        html += '<div class="connector-line"></div>';
        html += '<div class="tree-children">';
        html += block.children.map(child => renderBlock(child, level + 1)).join('');
        html += '</div>';
      }

      html += '</div></div>';
      return html;
    }

    function dragStartBlock(blockId) {
      draggedType = 'MOVE_' + blockId;
      event.dataTransfer.setData('text/plain', 'MOVE');
      event.dataTransfer.effectAllowed = 'move';
    }

    function getBlockLabel(block) {
      switch (block.type) {
        case 'container': return block.content || 'محدوده';
        case 'layout': return block.layoutType === 'grid' ? 'جدولی' : block.layoutType === 'list' ? 'لیستی' : 'مختصاتی';
        case 'visual': return block.content?.substring(0, 20) || 'ظاهری';
        case 'script': return (block.scriptType || 'اسکریپت');
        case 'resource': return block.icon ? block.icon : 'منابع';
        default: return 'بلوک';
      }
    }

    function generateCode() {
      let html = '<!DOCTYPE html>\n<html lang="fa" dir="rtl">\n<head>\n';
      html += '<meta charset="UTF-8">\n';
      html += '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n';
      html += '<title>BlockWeb</title>\n';
      html += '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">\n';
      html += '<style>\n  *{margin:0;padding:0;box-sizing:border-box}\n  body{font-family:sans-serif}\n';
      html += '</style>\n</head>\n<body>\n';

      treeData.blocks.forEach(block => {
        html += generateBlockHTML(block);
      });

      html += '\n</body>\n</html>';
      document.getElementById('codeOutput').textContent = html;
    }

    function generateBlockHTML(block) {
      let html = '';
      
      switch(block.type) {
        case 'container':
          html += '<div style="padding:16px;margin:8px 0">\n';
          if (block.children) {
            block.children.forEach(child => { html += generateBlockHTML(child); });
          }
          html += '</div>\n';
          break;
        case 'layout':
          html += '<div style="display:flex;gap:10px;flex-wrap:wrap">\n';
          if (block.children) {
            block.children.forEach(child => { html += generateBlockHTML(child); });
          }
          html += '</div>\n';
          break;
        case 'visual':
          const style = block.style || {};
          html += `<p style="font-size:${style.fontSize || '16px'};text-align:${style.textAlign || 'right'}">${block.content || ''}</p>\n`;
          break;
        case 'script':
          if (block.scriptType === 'heading') html += `<h2>${block.content || ''}</h2>\n`;
          else if (block.scriptType === 'button') html += `<button>${block.content || 'کلیک'}</button>\n`;
          else if (block.scriptType === 'card') html += `<div style="padding:16px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">${block.content || ''}</div>\n`;
          else html += `<p>${block.content || ''}</p>\n`;
          break;
        case 'resource':
          if (block.icon) html += `<i class="fa-solid ${block.icon}" style="color:${block.resourceColor}"></i>\n`;
          if (block.image) html += `<img src="${block.image}" style="max-width:100%">\n`;
          break;
      }
      
      return html;
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');

      if (tab === 'code') generateCode();
      if (tab === 'preview') updatePreview();
    }

    function updatePreview() {
      generateCode();
      const code = document.getElementById('codeOutput')?.textContent || '';
      const frame = document.getElementById('previewFrame');
      frame.srcdoc = code;
    }

    async function saveBlocks() {
      if (!projectId) return;
      
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'saveProjectBlocks',
            projectId: projectId,
            blocks: JSON.stringify(treeData)
          })
        });
        alert('ذخیره شد.');
      } catch (e) {
        alert('خطا در ذخیره‌سازی.');
      }
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    (async function init() {
      new BlockWebApp();
      
      currentUser = checkSession();
      if (!currentUser) {
        window.location.href = '../login.html';
        return;
      }
      
      const params = getQueryParams();
      domainName = params.domain;
      
      if (!domainName) {
        alert('دامنه پروژه مشخص نشده است.');
        window.location.href = '../dashboard.html';
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getProjectByDomain', domain: domainName })
        });
        const data = await res.json();
        if (data && data.success) {
          projectId = data.projectId;
          if (data.blocks && data.blocks !== '') {
            treeData = JSON.parse(data.blocks);
            renderTree();
          }
        }
      } catch (e) {}
    })();
  </script>

</body>
</html>
