<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCraft | ساخت پروژه جدید</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e2e8f0;
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
      --dark: #0f172a; --text: #334155; --text-light: #94a3b8;
      --white: #ffffff; --red: #f43f5e; --green: #10b981;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .form-container {
      background: var(--white); border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08); width: 100%;
      max-width: 520px; overflow: hidden; border: 1px solid var(--bg3);
    }
    .form-header {
      padding: 28px 24px 20px; text-align: center;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    }
    .form-logo {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px; box-shadow: 0 4px 16px rgba(99,102,241,0.25);
    }
    .form-logo i { font-size: 28px; color: #fff; }
    .form-header h2 { font-size: 20px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
    .form-header p { font-size: 12px; color: var(--text-light); }

    .form-body { padding: 20px 24px 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text); margin-bottom: 6px;
    }
    .input-wrapper { position: relative; }
    .input-wrapper i {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text-light); font-size: 14px;
    }
    .input-wrapper input {
      width: 100%; padding: 12px 42px 12px 14px;
      border: 1.5px solid var(--bg3); border-radius: 12px;
      font-size: 13px; color: var(--dark); background: var(--bg);
      outline: none; font-family: inherit; transition: all 0.3s ease;
    }
    .input-wrapper input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
      background: var(--white);
    }
    .input-wrapper input::placeholder { color: #c4c8d0; font-size: 11px; }

    .domain-preview {
      font-size: 11px; color: var(--primary); margin-top: 6px;
      direction: ltr; text-align: right; background: #eef2ff;
      padding: 8px 12px; border-radius: 8px; word-break: break-all;
    }

    .btn-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none;
      border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.3s ease; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { box-shadow: 0 6px 20px rgba(99,102,241,0.3); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-message {
      text-align: center; font-size: 12px; margin-top: 10px; min-height: 18px;
    }
    .form-message.error { color: var(--red); }
    .form-message.success { color: var(--green); }
    .form-message.info { color: var(--primary); }

    .back-link {
      text-align: center; margin-top: 16px; font-size: 12px;
    }
    .back-link a { color: var(--primary-dark); text-decoration: none; font-weight: 600; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px; width: 100%; max-width: 400px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2); text-align: center; padding: 28px 20px;
    }
    .modal i { font-size: 48px; color: var(--primary); margin-bottom: 12px; }
    .modal h3 { font-size: 16px; color: var(--dark); margin-bottom: 8px; }
    .modal p { font-size: 12px; color: var(--text-light); margin-bottom: 20px; line-height: 1.8; }
    .modal-buttons { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel {
      padding: 10px 24px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.3s ease;
      background: var(--bg2); color: var(--text); border: 1px solid var(--bg3);
    }
    .btn-confirm {
      padding: 10px 24px; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.3s ease;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none;
    }

    .limit-warning {
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 16px; text-align: center;
    }
    .limit-warning i { color: var(--red); font-size: 18px; }
    .limit-warning p { font-size: 12px; color: var(--red); margin-top: 4px; }
    .btn-upgrade-link {
      display: inline-block; margin-top: 8px; padding: 8px 16px;
      background: var(--red); color: #fff; border-radius: 8px;
      font-size: 11px; font-weight: 600; text-decoration: none;
    }

    .domain-status {
      font-size: 11px; margin-top: 4px; min-height: 16px;
    }
    .domain-status.available { color: var(--green); }
    .domain-status.taken { color: var(--red); }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="form-header">
      <div class="form-logo"><i class="fa-solid fa-plus"></i></div>
      <h2>ساخت پروژه جدید</h2>
      <p>اطلاعات اولیه سایت خود را وارد کنید</p>
    </div>

    <div class="form-body">
      <div class="limit-warning" id="limitWarning" style="display:none;">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <p id="limitMessage"></p>
        <a href="../plans.html" class="btn-upgrade-link">
          <i class="fa-solid fa-crown"></i> خرید اشتراک
        </a>
      </div>

      <form id="projectForm" onsubmit="handleCreateProject(event)">
        <div class="form-group">
          <label>نام سایت</label>
          <div class="input-wrapper">
            <input type="text" id="projectName" placeholder="مثلاً: فروشگاه من" required>
            <i class="fa-solid fa-globe"></i>
          </div>
        </div>

        <div class="form-group">
          <label>متن سربرگ</label>
          <div class="input-wrapper">
            <input type="text" id="headerText" placeholder="مثلاً: به سایت ما خوش آمدید">
            <i class="fa-solid fa-heading"></i>
          </div>
        </div>

        <div class="form-group">
          <label>لینک لوگو</label>
          <div class="input-wrapper">
            <input type="url" id="logoUrl" placeholder="https://example.com/logo.png">
            <i class="fa-solid fa-image"></i>
          </div>
        </div>

        <div class="form-group">
          <label>دامنه (نام یکتا)</label>
          <div class="input-wrapper">
            <input type="text" id="domainName" placeholder="مثلاً: my-shop" required oninput="checkDomain()">
            <i class="fa-solid fa-link"></i>
          </div>
          <div class="domain-status" id="domainStatus"></div>
          <div class="domain-preview" id="domainPreview">
            <i class="fa-solid fa-globe"></i> .../projects.html?<span id="domainSpan"></span>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
          <i class="fa-solid fa-rocket"></i> ساخت پروژه
        </button>
        <div class="form-message" id="formMessage"></div>
      </form>

      <div class="back-link">
        <a href="../dashboard.html"><i class="fa-solid fa-arrow-right"></i> بازگشت به داشبورد</a>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <i class="fa-solid fa-circle-question"></i>
      <h3>آیا مطمئن هستید؟</h3>
      <p>
        با ساخت این پروژه، <strong>یک پروژه از سقف شما کسر می‌شود</strong> و
        <strong>امکان حذف آن وجود ندارد</strong>.
      </p>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeConfirmModal()">انصراف</button>
        <button class="btn-confirm" onclick="confirmCreateProject()">بله، بساز</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwATHkWehDwSXpcb9Ufx4g31fc49pbz3pPTB-154c7BhnsNeNRwDid3Upv6RtjU7r5F/exec';
    const SESSION_DURATION = 3 * 60 * 60 * 1000;

    let pendingProjectData = null;
    let userPlanInfo = null;
    let currentUser = null;
    let isDomainAvailable = false;
    let domainCheckTimeout = null;

    class WebCraftApp {
      constructor() {
        this.webApp = window.Eitaa && window.Eitaa.WebApp ? window.Eitaa.WebApp : null;
        if (this.webApp) { this.webApp.ready(); this.webApp.expand(); }
      }
    }

    function checkSession() {
      const sessionData = localStorage.getItem('webcraft_session');
      if (!sessionData) return null;
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('webcraft_session');
          return null;
        }
        return session.user;
      } catch (e) {
        localStorage.removeItem('webcraft_session');
        return null;
      }
    }

    async function checkProjectLimit() {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getUserPlanInfo', userId: currentUser.userId })
        });
        const data = await res.json();
        if (data) {
          userPlanInfo = data;
          const usedProjects = data.usedProjects || 0;
          const maxProjects = data.maxProjects || 1;
          const remaining = Math.max(0, maxProjects - usedProjects);

          if (remaining <= 0) {
            document.getElementById('limitWarning').style.display = 'block';
            document.getElementById('limitMessage').textContent = 
              'سقف پروژه‌های شما (' + maxProjects + ' عدد) پر شده است. برای ساخت پروژه جدید، اشتراک خود را ارتقا دهید.';
            document.getElementById('btnSubmit').disabled = true;
            return false;
          }
        }
        return true;
      } catch (e) {
        return true;
      }
    }

    async function checkDomain() {
      const domain = document.getElementById('domainName').value.trim();
      const statusEl = document.getElementById('domainStatus');
      const domainSpan = document.getElementById('domainSpan');
      
      domainSpan.textContent = domain || '...';
      
      if (!domain) {
        statusEl.textContent = '';
        statusEl.className = 'domain-status';
        isDomainAvailable = false;
        return;
      }

      if (domain.length < 3) {
        statusEl.textContent = 'حداقل ۳ کاراکتر';
        statusEl.className = 'domain-status taken';
        isDomainAvailable = false;
        return;
      }

      if (!/^[a-zA-Z0-9\-_]+$/.test(domain)) {
        statusEl.textContent = 'فقط حروف انگلیسی، عدد و خط تیره';
        statusEl.className = 'domain-status taken';
        isDomainAvailable = false;
        return;
      }

      clearTimeout(domainCheckTimeout);
      domainCheckTimeout = setTimeout(async () => {
        try {
          const res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'checkDomain', domain: domain })
          });
          const data = await res.json();
          
          if (data.success && data.available) {
            statusEl.textContent = 'دامنه آزاد است';
            statusEl.className = 'domain-status available';
            isDomainAvailable = true;
          } else {
            statusEl.textContent = 'این دامنه قبلاً استفاده شده';
            statusEl.className = 'domain-status taken';
            isDomainAvailable = false;
          }
        } catch (e) {
          statusEl.textContent = 'خطا در بررسی دامنه';
          statusEl.className = 'domain-status taken';
          isDomainAvailable = false;
        }
      }, 500);
    }

    function updateDomainPreview() {
      const domain = document.getElementById('domainName').value.trim() || '...';
      document.getElementById('domainSpan').textContent = domain;
    }

    function handleCreateProject(e) {
      e.preventDefault();
      
      const projectName = document.getElementById('projectName').value.trim();
      const headerText = document.getElementById('headerText').value.trim();
      const logoUrl = document.getElementById('logoUrl').value.trim();
      const domainName = document.getElementById('domainName').value.trim();

      if (!projectName || !domainName) {
        document.getElementById('formMessage').textContent = 'نام سایت و دامنه الزامی است';
        document.getElementById('formMessage').className = 'form-message error';
        return;
      }

      if (!isDomainAvailable) {
        document.getElementById('formMessage').textContent = 'لطفاً یک دامنه آزاد انتخاب کنید';
        document.getElementById('formMessage').className = 'form-message error';
        return;
      }

      pendingProjectData = { projectName, headerText, logoUrl, domainName };
      document.getElementById('confirmModal').classList.add('active');
    }

    function closeConfirmModal() {
      document.getElementById('confirmModal').classList.remove('active');
      pendingProjectData = null;
    }

    async function confirmCreateProject() {
      if (!pendingProjectData) return;

      const btnSubmit = document.getElementById('btnSubmit');
      const msgEl = document.getElementById('formMessage');
      btnSubmit.disabled = true;
      msgEl.textContent = 'در حال ساخت پروژه...';
      msgEl.className = 'form-message info';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'createProject',
            userId: currentUser.userId,
            projectName: pendingProjectData.projectName,
            headerText: pendingProjectData.headerText,
            logoUrl: pendingProjectData.logoUrl
          })
        });
        const data = await res.json();

        if (data.success) {
          await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({
              action: 'saveProjectSettings',
              projectId: data.projectId,
              domain: pendingProjectData.domainName,
              settings: JSON.stringify({
                header: 'yes',
                textAlign: ['right'],
                footer: '2',
                stats: 'no',
                support: 'no',
                supportPrompt: '',
                bodyType: [],
                color1: '#6366f1',
                color2: '#f8fafc',
                color3: '#0f172a',
                sound1: '',
                sound2: '',
                sound3: ''
              })
            })
          });

          msgEl.textContent = 'پروژه با موفقیت ساخته شد! در حال انتقال...';
          msgEl.className = 'form-message success';
          
          setTimeout(() => {
            window.location.href = 'editor.html?domain=' + pendingProjectData.domainName;
          }, 1000);
        } else {
          msgEl.textContent = data.message || 'خطا در ساخت پروژه';
          msgEl.className = 'form-message error';
          btnSubmit.disabled = false;
        }
      } catch (e) {
        msgEl.textContent = 'خطا در ارتباط با سرور';
        msgEl.className = 'form-message error';
        btnSubmit.disabled = false;
      }

      closeConfirmModal();
    }

    (async function init() {
      new WebCraftApp();
      
      currentUser = checkSession();
      if (!currentUser) {
        window.location.href = '../login.html';
        return;
      }

      const canCreate = await checkProjectLimit();
      if (!canCreate) {
        document.getElementById('btnSubmit').disabled = true;
      }

      updateDomainPreview();
    })();
  </script>

</body>
</html>
