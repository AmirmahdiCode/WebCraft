<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCraft | اشتراک ها</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e2e8f0;
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
      --dark: #0f172a; --text: #334155; --text-light: #94a3b8;
      --white: #ffffff; --red: #f43f5e; --green: #10b981;
      --orange: #f59e0b; --purple: #a855f7;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .header {
      background: var(--white); box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px; position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--bg3);
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; max-width: 1100px; margin: 0 auto;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(99,102,241,0.2);
    }
    .header-logo i { font-size: 20px; color: #fff; }
    .header-title { font-size: 20px; font-weight: 700; color: var(--dark); }
    .header-subtitle { font-size: 10px; color: var(--text-light); }
    .header-btns { display: flex; align-items: center; gap: 8px; }
    .header-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 7px 12px; border-radius: 8px;
      transition: all 0.2s ease; white-space: nowrap;
      font-family: inherit; cursor: pointer; background: none;
      color: var(--text); border: 1.5px solid var(--bg3);
    }
    .header-btn:hover { background: var(--bg2); }

    .main-container { flex: 1; max-width: 1000px; width: 100%; margin: 24px auto; padding: 0 16px; }

    .section-title {
      text-align: center; font-size: 18px; color: var(--dark);
      margin-bottom: 20px; position: relative; font-weight: 700;
    }
    .section-title::after {
      content: ''; display: block; width: 40px; height: 2px;
      background: var(--primary); margin: 8px auto 0; border-radius: 1px;
    }

    .plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }

    .plan-card {
      background: var(--white); border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden;
      border: 1px solid var(--bg3); transition: all 0.3s ease;
      display: flex; flex-direction: column;
    }
    .plan-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.1); }
    .plan-card.featured { border-color: var(--primary); box-shadow: 0 4px 20px rgba(99,102,241,0.15); }

    .plan-header {
      padding: 24px 20px 16px; text-align: center;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    }
    .plan-header i { font-size: 32px; color: var(--primary); margin-bottom: 8px; }
    .plan-header h3 { font-size: 17px; font-weight: 700; color: var(--dark); }
    .plan-header .plan-price {
      font-size: 28px; font-weight: 700; color: var(--primary); margin-top: 8px;
    }
    .plan-header .plan-price span { font-size: 14px; font-weight: 400; color: var(--text-light); }

    .plan-body { padding: 16px 20px; flex: 1; }
    .plan-features { list-style: none; padding: 0; }
    .plan-features li {
      padding: 8px 0; font-size: 13px; display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--bg2);
    }
    .plan-features li:last-child { border-bottom: none; }
    .plan-features li i.fa-check { color: var(--green); }
    .plan-features li i.fa-xmark { color: var(--text-light); }
    .plan-features li i.fa-infinity { color: var(--purple); }

    .plan-footer { padding: 16px 20px; border-top: 1px solid var(--bg3); }
    .btn-select {
      width: 100%; padding: 12px; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none;
    }
    .btn-select:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
    .btn-current {
      width: 100%; padding: 12px; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: default;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--bg2); color: var(--text-light); border: 1px solid var(--bg3);
    }

    .footer {
      text-align: center; padding: 20px; background: var(--white);
      border-top: 1px solid var(--bg3); margin-top: auto;
    }
    .footer-links {
      display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .footer-links a {
      color: var(--primary-dark); font-size: 11px; text-decoration: none;
      display: flex; align-items: center; gap: 4px;
    }
    .footer-links a:hover { color: var(--dark); }
    .footer-text { font-size: 10px; color: var(--text-light); }

    @media (max-width: 600px) {
      .plans-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo"><i class="fa-solid fa-cubes"></i></div>
        <div>
          <div class="header-title">WebCraft</div>
          <div class="header-subtitle">سایت بسازید، بدون کدنویسی</div>
        </div>
      </div>
      <div class="header-btns">
        <a href="dashboard.html" class="header-btn"><i class="fa-solid fa-arrow-right"></i> داشبورد</a>
      </div>
    </div>
  </header>

  <main class="main-container">
    <h2 class="section-title">پلن‌های اشتراک</h2>
    <div class="plans-grid" id="plansGrid">
      <div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--text-light);">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size:32px;"></i>
        <p style="margin-top:12px;">در حال بارگذاری...</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="ads.html"><i class="fa-solid fa-ad"></i> رزرو تبلیغات</a>
      <a href="support.html"><i class="fa-solid fa-headset"></i> پشتیبانی</a>
    </div>
    <p class="footer-text">WebCraft — کلیه حقوق محفوظ است</p>
  </footer>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzhx-rXcEZb-Q0D7ekTcuGfH5OujNRPpb4LRcQ49U4q4jAPjQRI6JrNxcQDNPzwM4mG/exec';
    const SESSION_DURATION = 3 * 60 * 60 * 1000;

    class WebCraftApp {
      constructor() {
        this.webApp = window.Eitaa && window.Eitaa.WebApp ? window.Eitaa.WebApp : null;
        if (this.webApp) { this.webApp.ready(); this.webApp.expand(); }
      }
    }

    function checkSession() {
      const sessionData = localStorage.getItem('webcraft_session');
      if (!sessionData) return null;
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('webcraft_session');
          return null;
        }
        return session.user;
      } catch (e) {
        localStorage.removeItem('webcraft_session');
        return null;
      }
    }

    function selectPlan(planId, planName, price) {
      localStorage.setItem('wc_selected_plan', JSON.stringify({
        planId: planId,
        planName: planName,
        price: price
      }));
      window.location.href = 'pay.html';
    }

    async function loadPlans() {
      const grid = document.getElementById('plansGrid');
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getPlans' })
        });
        const plans = await res.json();
        
        if (!plans || plans.length === 0) {
          grid.innerHTML = '<div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--text-light);"><i class="fa-solid fa-box-open" style="font-size:40px;"></i><p>هنوز پلنی ثبت نشده</p></div>';
          return;
        }

        grid.innerHTML = plans.map(plan => {
          const features = getFeatures(plan.planId, plan.maxProjects);
          
          return `
            <div class="plan-card ${plan.planId === 'plan_gold' ? 'featured' : ''}">
              <div class="plan-header">
                <i class="fa-solid ${getPlanIcon(plan.planId)}"></i>
                <h3>${plan.planName}</h3>
                <div class="plan-price">
                  ${plan.price > 0 ? Number(plan.price).toLocaleString('fa-IR') : 'رایگان'}
                  <span>${plan.price > 0 ? 'تومان' : ''}</span>
                </div>
              </div>
              <div class="plan-body">
                <ul class="plan-features">
                  ${features.map(f => `
                    <li>
                      <i class="fa-solid ${f.icon}"></i> ${f.text}
                    </li>
                  `).join('')}
                </ul>
              </div>
              <div class="plan-footer">
                ${plan.price > 0 ? `
                  <button class="btn-select" onclick="selectPlan('${plan.planId}', '${plan.planName}', ${plan.price})">
                    <i class="fa-solid fa-cart-shopping"></i> خرید اشتراک
                  </button>
                ` : `
                  <button class="btn-select" onclick="selectPlan('${plan.planId}', '${plan.planName}', 0)">
                    <i class="fa-solid fa-check"></i> شروع رایگان
                  </button>
                `}
              </div>
            </div>
          `;
        }).join('');
        
      } catch (e) {
        grid.innerHTML = '<div style="text-align:center;padding:40px;grid-column:1/-1;color:var(--red);"><i class="fa-solid fa-triangle-exclamation" style="font-size:40px;"></i><p>خطا در بارگذاری</p></div>';
      }
    }

    function getPlanIcon(planId) {
      const icons = {
        'plan_free': 'fa-seedling',
        'plan_silver': 'fa-medal',
        'plan_gold': 'fa-crown',
        'plan_vip': 'fa-gem',
        'plan_unlimited': 'fa-rocket'
      };
      return icons[planId] || 'fa-box';
    }

    function getFeatures(planId, maxProjects) {
      const baseFeatures = [
        { icon: 'fa-check', text: 'دسترسی به WebCraft Builder' },
        { icon: 'fa-check', text: 'انتخاب دامنه اختصاصی' },
        { icon: 'fa-check', text: 'تنظیمات ظاهری پایه' },
        { icon: 'fa-check', text: '۳ رنگ + ۳ صوت' },
      ];

      if (maxProjects >= 999) {
        baseFeatures.push({ icon: 'fa-infinity', text: 'سقف پروژه: بی نهایت' });
      } else {
        baseFeatures.push({ icon: 'fa-check', text: 'سقف پروژه: ' + maxProjects + ' عدد' });
      }

      if (planId === 'plan_free') {
        baseFeatures.push({ icon: 'fa-xmark', text: 'تنظیمات پرومیوم' });
        baseFeatures.push({ icon: 'fa-xmark', text: 'پیش نمایش زنده' });
      } else if (planId === 'plan_silver') {
        baseFeatures.push({ icon: 'fa-check', text: 'پالت رنگ دلخواه' });
        baseFeatures.push({ icon: 'fa-xmark', text: 'پیش نمایش زنده' });
      } else {
        baseFeatures.push({ icon: 'fa-check', text: 'تمام تنظیمات پرومیوم' });
        baseFeatures.push({ icon: 'fa-check', text: 'پیش نمایش زنده' });
        baseFeatures.push({ icon: 'fa-check', text: 'انیمیشن و پارالاکس' });
        baseFeatures.push({ icon: 'fa-check', text: 'پشتیبانی اختصاصی' });
      }

      return baseFeatures;
    }

    (function init() {
      new WebCraftApp();
      
      const user = checkSession();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      
      loadPlans();
    })();
  </script>

</body>
</html>
