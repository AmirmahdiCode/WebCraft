<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCraft | سایت بسازید</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e2e8f0;
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
      --dark: #0f172a; --text: #334155; --text-light: #94a3b8;
      --white: #ffffff; --red: #f43f5e; --green: #10b981;
      --purple: #a855f7; --orange: #f59e0b; --cyan: #06b6d4;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark);
      color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden; position: relative;
    }

    .bg-particles {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 0;
    }
    .particle {
      position: absolute; font-size: 60px; color: rgba(99,102,241,0.08);
      animation: floatAround 20s linear infinite; user-select: none;
    }
    .particle:nth-child(1) { top: 5%; left: 8%; animation-delay: 0s; font-size: 80px; }
    .particle:nth-child(2) { top: 70%; left: 75%; animation-delay: -5s; font-size: 50px; }
    .particle:nth-child(3) { top: 20%; left: 60%; animation-delay: -10s; font-size: 100px; }
    .particle:nth-child(4) { top: 80%; left: 15%; animation-delay: -15s; font-size: 45px; }
    .particle:nth-child(5) { top: 45%; left: 40%; animation-delay: -3s; font-size: 70px; }
    .particle:nth-child(6) { top: 10%; left: 85%; animation-delay: -12s; font-size: 55px; }
    .particle:nth-child(7) { top: 60%; left: 50%; animation-delay: -7s; font-size: 65px; }
    .particle:nth-child(8) { top: 35%; left: 20%; animation-delay: -18s; font-size: 90px; }

    @keyframes floatAround {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.08; }
      25% { transform: translate(30px, -40px) rotate(90deg) scale(1.1); opacity: 0.12; }
      50% { transform: translate(-20px, 30px) rotate(180deg) scale(0.9); opacity: 0.06; }
      75% { transform: translate(-40px, -20px) rotate(270deg) scale(1.05); opacity: 0.1; }
      100% { transform: translate(0, 0) rotate(360deg) scale(1); opacity: 0.08; }
    }

    .splash-container {
      text-align: center; position: relative; z-index: 1;
      background: rgba(255,255,255,0.95); border-radius: 24px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.2);
      padding: 48px 32px; max-width: 480px; width: 100%;
      backdrop-filter: blur(10px);
    }
    .splash-logo {
      width: 88px; height: 88px; border-radius: 22px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 28px rgba(99,102,241,0.35);
    }
    .splash-logo i { font-size: 40px; color: #fff; }
    .splash-title {
      font-size: 28px; font-weight: 700; color: var(--dark); margin-bottom: 8px;
    }
    .splash-subtitle {
      font-size: 14px; color: var(--text-light); margin-bottom: 32px; line-height: 1.8;
    }
    .splash-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none;
      border-radius: 14px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.3s ease; text-decoration: none;
    }
    .splash-btn:hover {
      box-shadow: 0 8px 28px rgba(99,102,241,0.4);
      transform: translateY(-2px);
    }
    .splash-btn:active { transform: scale(0.97); }
    .splash-footer {
      margin-top: 28px; font-size: 11px; color: var(--text-light);
    }
    .splash-features {
      display: flex; justify-content: center; gap: 20px;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .splash-feature {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      font-size: 12px; color: var(--primary-dark);
    }
    .splash-feature i {
      font-size: 22px; color: var(--primary);
      background: #eef2ff; padding: 10px;
      border-radius: 12px;
    }

    @media (max-width: 480px) {
      .splash-container { padding: 32px 20px; }
      .splash-logo { width: 70px; height: 70px; }
      .splash-logo i { font-size: 32px; }
      .splash-title { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-particles">
    <span class="particle">{</span>
    <span class="particle">}</span>
    <span class="particle">&lt;/&gt;</span>
    <span class="particle">0</span>
    <span class="particle">1</span>
    <span class="particle">#</span>
    <span class="particle">&lt;div&gt;</span>
    <span class="particle">;</span>
  </div>

  <div class="splash-container">
    <div class="splash-logo">
      <i class="fa-solid fa-cubes"></i>
    </div>
    <h1 class="splash-title">WebCraft</h1>
    <p class="splash-subtitle">
      سایت خود را بدون حتی یک خط کدنویسی بسازید<br>
      حرفه‌ای، سریع و آسان
    </p>
    <div class="splash-features">
      <div class="splash-feature">
        <i class="fa-solid fa-puzzle-piece"></i>
        <span>بدون کد</span>
      </div>
      <div class="splash-feature">
        <i class="fa-solid fa-bolt"></i>
        <span>سریع</span>
      </div>
      <div class="splash-feature">
        <i class="fa-solid fa-mobile-screen"></i>
        <span>واکنش‌گرا</span>
      </div>
    </div>
    <a href="login.html" class="splash-btn">
      <i class="fa-solid fa-right-to-bracket"></i> ورود به WebCraft
    </a>
    <p class="splash-footer">
      <i class="fa-solid fa-shield-halved"></i> با پشتیبانی از پیام‌رسان ایتا
    </p>
  </div>

  <script>
    const SESSION_DURATION = 3 * 60 * 60 * 1000;

    if (window.Eitaa && window.Eitaa.WebApp) {
      window.Eitaa.WebApp.ready();
    }

    function checkSession() {
      const sessionData = localStorage.getItem('webcraft_session');
      if (!sessionData) return null;
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('webcraft_session');
          return null;
        }
        return session.user;
      } catch (e) {
        localStorage.removeItem('webcraft_session');
        return null;
      }
    }

    (function init() {
      const session = checkSession();
      if (session) {
        window.location.href = 'dashboard.html';
      }
    })();
  </script>

</body>
</html>
