<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCraft | پروفایل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e2e8f0;
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
      --dark: #0f172a; --text: #334155; --text-light: #94a3b8;
      --white: #ffffff; --red: #f43f5e; --green: #10b981;
      --purple: #a855f7; --orange: #f59e0b;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .header {
      background: var(--white); box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 14px 20px; position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--bg3);
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; max-width: 1100px; margin: 0 auto;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(99,102,241,0.2);
    }
    .header-logo i { font-size: 20px; color: #fff; }
    .header-title { font-size: 20px; font-weight: 700; color: var(--dark); }
    .header-subtitle { font-size: 10px; color: var(--text-light); }
    .header-btns { display: flex; align-items: center; gap: 8px; }
    .header-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; text-decoration: none;
      padding: 8px 14px; border-radius: 10px;
      transition: all 0.3s ease; white-space: nowrap;
      font-family: inherit; cursor: pointer; background: none;
    }
    .btn-back { color: var(--primary-dark); border: 1.5px solid var(--primary-light); }
    .btn-back:hover { background: #eef2ff; }
    .btn-logout { color: var(--red); border: 1.5px solid var(--red); }
    .btn-logout:hover { background: #fef2f2; }

    .loading-container {
      display: flex; align-items: center; justify-content: center;
      flex: 1; min-height: 60vh;
    }
    .loading-spinner { text-align: center; }
    .loading-spinner i {
      font-size: 40px; color: var(--primary);
      animation: spin 1s linear infinite;
    }
    .loading-spinner p { margin-top: 12px; font-size: 13px; color: var(--text-light); }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .main-container { flex: 1; max-width: 700px; width: 100%; margin: 24px auto; padding: 0 16px; display: none; }
    .main-container.loaded { display: block; }

    .profile-card {
      background: var(--white); border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px;
      border: 1px solid var(--bg3);
    }
    .profile-top {
      display: flex; align-items: center; gap: 16px;
      padding: 24px; background: linear-gradient(135deg, #eef2ff, #e0e7ff);
    }
    .avatar-wrapper { position: relative; flex-shrink: 0; }
    .avatar-display {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; color: #fff;
      border: 3px solid var(--white);
      box-shadow: 0 4px 14px rgba(99,102,241,0.25);
    }
    .project-badge {
      position: absolute; bottom: -2px; right: -2px;
      background: var(--dark); color: #fff;
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--white);
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-info h2 { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 2px; }
    .profile-info .username { font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
    .type-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 4px 10px; border-radius: 12px;
    }
    .type-normal { background: #f1f5f9; color: #475569; }
    .type-developer { background: #eef2ff; color: #4f46e5; }
    .type-vip { background: #fef3c7; color: #d97706; }
    .type-owner { background: #f3e8ff; color: #9333ea; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--bg3);
    }
    .stat-item {
      text-align: center; padding: 16px 8px; position: relative;
    }
    .stat-item:not(:last-child)::after {
      content: ''; position: absolute; left: 0; top: 20%; height: 60%;
      width: 1px; background: var(--bg3);
    }
    .stat-number { font-size: 22px; font-weight: 700; color: var(--dark); }
    .stat-label { font-size: 10px; color: var(--text-light); margin-top: 2px; }
    .stat-remaining .stat-number { color: var(--green); }
    .stat-max .stat-number { color: var(--primary); }

    .details-section { padding: 20px 24px; border-top: 1px solid var(--bg3); }
    .detail-row {
      display: flex; align-items: center; gap: 12px; padding: 12px 0;
    }
    .detail-row:not(:last-child) { border-bottom: 1px solid var(--bg2); }
    .detail-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: #eef2ff; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--primary); flex-shrink: 0;
    }
    .detail-content { flex: 1; min-width: 0; }
    .detail-label { font-size: 10px; color: var(--text-light); }
    .detail-value { font-size: 13px; font-weight: 600; color: var(--dark); }
    .plans-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .plan-tag {
      font-size: 10px; padding: 3px 8px; border-radius: 8px;
      background: #eef2ff; color: var(--primary-dark); font-weight: 500;
    }

    .plan-card {
      background: var(--white); border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 20px;
      border: 1.5px dashed var(--primary-light);
    }
    .plan-header {
      padding: 16px 20px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--bg2);
    }
    .plan-header i { font-size: 20px; color: var(--primary); }
    .plan-header h3 { font-size: 15px; color: var(--dark); font-weight: 700; }
    .plan-body { padding: 16px 20px; }
    .plan-body p { font-size: 12px; color: var(--text-light); line-height: 1.8; }
    .btn-upgrade {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px; margin-top: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none;
      border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.3s ease;
    }
    .btn-upgrade:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.3); }

    .btn-edit {
      width: 100%; padding: 12px;
      background: var(--white); color: var(--primary-dark);
      border: 1.5px solid var(--primary-light); border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-edit:hover { background: #eef2ff; }

    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--white); border-radius: 16px;
      width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .modal-header {
      padding: 20px 20px 16px; border-bottom: 1px solid var(--bg2);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 16px; color: var(--dark); }
    .modal-close {
      background: none; border: none; font-size: 18px; color: var(--text-light);
      cursor: pointer; padding: 4px;
    }
    .modal-close:hover { color: var(--dark); }
    .modal-body { padding: 20px; }

    .avatar-picker {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;
      justify-content: center;
    }
    .avatar-option {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer;
      border: 2px solid transparent; transition: all 0.2s ease;
      background: var(--bg2); color: var(--text);
    }
    .avatar-option:hover { border-color: var(--primary-light); background: #eef2ff; }
    .avatar-option.selected { border-color: var(--primary); background: #eef2ff; }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text); margin-bottom: 6px;
    }
    .input-wrapper { position: relative; }
    .input-wrapper i {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text-light); font-size: 14px;
    }
    .input-wrapper input {
      width: 100%; padding: 11px 40px 11px 14px;
      border: 1.5px solid var(--bg3); border-radius: 10px;
      font-size: 13px; color: var(--dark); background: var(--bg);
      outline: none; font-family: inherit; transition: all 0.3s ease;
    }
    .input-wrapper input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
      background: var(--white);
    }

    .btn-save {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--green), #059669);
      color: #fff; border: none;
      border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.3s ease; margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-save:hover { box-shadow: 0 4px 16px rgba(16,185,129,0.25); }

    .form-message {
      text-align: center; font-size: 12px; margin-top: 10px; min-height: 18px;
    }
    .form-message.error { color: var(--red); }
    .form-message.success { color: var(--green); }

    @media (max-width: 500px) {
      .profile-top { padding: 20px; gap: 12px; }
      .avatar-display { width: 64px; height: 64px; font-size: 28px; }
      .stat-number { font-size: 18px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-right">
        <div class="header-logo"><i class="fa-solid fa-cubes"></i></div>
        <div>
          <div class="header-title">WebCraft</div>
          <div class="header-subtitle">سایت بسازید، بدون کدنویسی</div>
        </div>
      </div>
      <div class="header-btns">
        <a href="dashboard.html" class="header-btn btn-back">
          <i class="fa-solid fa-arrow-right"></i> داشبورد
        </a>
        <button class="header-btn btn-logout" onclick="handleLogout()">
          <i class="fa-solid fa-right-from-bracket"></i> خروج
        </button>
      </div>
    </div>
  </header>

  <div class="loading-container" id="loadingContainer">
    <div class="loading-spinner">
      <i class="fa-solid fa-circle-notch"></i>
      <p>در حال بارگذاری...</p>
    </div>
  </div>

  <main class="main-container" id="mainContainer">

    <div class="profile-card">
      <div class="profile-top">
        <div class="avatar-wrapper">
          <div class="avatar-display" id="avatarDisplay">
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="project-badge" id="remainingBadge">0</div>
        </div>
        <div class="profile-info">
          <h2 id="displayName">---</h2>
          <div class="username" id="displayUsername">---</div>
          <span class="type-badge type-normal" id="typeBadge">عادی</span>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-item stat-used">
          <div class="stat-number" id="statUsed">0</div>
          <div class="stat-label">ساخته شده</div>
        </div>
        <div class="stat-item stat-max">
          <div class="stat-number" id="statMax">0</div>
          <div class="stat-label">سقف پروژه</div>
        </div>
        <div class="stat-item stat-remaining">
          <div class="stat-number" id="statRemaining">0</div>
          <div class="stat-label">باقی مانده</div>
        </div>
      </div>

      <div class="details-section">
        <div class="detail-row">
          <div class="detail-icon"><i class="fa-solid fa-id-card"></i></div>
          <div class="detail-content">
            <div class="detail-label">نام کامل</div>
            <div class="detail-value" id="infoFullName">---</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon"><i class="fa-solid fa-at"></i></div>
          <div class="detail-content">
            <div class="detail-label">نام کاربری</div>
            <div class="detail-value" id="infoUsername">---</div>
          </div>
        </div>
        <div class="detail-row">
          <div class="detail-icon"><i class="fa-solid fa-crown"></i></div>
          <div class="detail-content">
            <div class="detail-label">اشتراک های من</div>
            <div class="detail-value" id="infoPlan">---</div>
            <div class="plans-tags" id="plansTags"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="plan-card" id="upgradeCard" style="display:none;">
      <div class="plan-header">
        <i class="fa-solid fa-arrow-up"></i>
        <h3>ارتقای اشتراک</h3>
      </div>
      <div class="plan-body">
        <p>با ارتقای اشتراک خود، سقف پروژه‌های بیشتری داشته باشید و سایت‌های حرفه‌ای‌تری بسازید.</p>
        <button class="btn-upgrade" onclick="window.location.href='plans.html'">
          <i class="fa-solid fa-crown"></i> مشاهده پلن‌ها و خرید اشتراک
        </button>
      </div>
    </div>

    <button class="btn-edit" onclick="openEditModal()">
      <i class="fa-solid fa-pen-to-square"></i> ویرایش پروفایل
    </button>

  </main>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3>ویرایش پروفایل</h3>
        <button class="modal-close" onclick="closeEditModal()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <label style="display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px;text-align:center;">انتخاب آواتار</label>
        <div class="avatar-picker" id="avatarPicker"></div>
        <div class="form-group">
          <label>نام کامل</label>
          <div class="input-wrapper">
            <input type="text" id="editFullName" placeholder="نام کامل خود را وارد کنید">
            <i class="fa-solid fa-id-card"></i>
          </div>
        </div>
        <div class="form-group">
          <label>نام کاربری</label>
          <div class="input-wrapper">
            <input type="text" id="editUsername" placeholder="نام کاربری جدید">
            <i class="fa-solid fa-at"></i>
          </div>
        </div>
        <div class="form-group">
          <label>رمز عبور جدید</label>
          <div class="input-wrapper">
            <input type="password" id="editPassword" placeholder="در صورت عدم تغییر خالی بگذارید">
            <i class="fa-solid fa-lock"></i>
          </div>
        </div>
        <button class="btn-save" onclick="saveProfile()">
          <i class="fa-solid fa-check"></i> ذخیره تغییرات
        </button>
        <div class="form-message" id="editMessage"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxwzQT4V2OKe9Ag1P9tRL5OKB2wsryRdAwrDZ81ZwZYg-H8GdKKzusT8Y4tJbLu1S27/exec';
    const SESSION_DURATION = 3 * 60 * 60 * 1000;

    const avatarIcons = [
      'fa-user', 'fa-face-smile', 'fa-star', 'fa-heart', 'fa-moon',
      'fa-sun', 'fa-fire', 'fa-bolt', 'fa-gem', 'fa-crown',
      'fa-ghost', 'fa-dragon', 'fa-cat', 'fa-dog', 'fa-fish',
      'fa-feather', 'fa-leaf', 'fa-snowflake', 'fa-meteor', 'fa-rocket'
    ];

    let currentUser = null;
    let selectedAvatar = '';
    let maxProjects = 1;

    const userTypeLabels = { 'normal': 'عادی', 'developer': 'توسعه دهنده', 'vip': 'ویژه', 'owner': 'مالک' };
    const userTypeClasses = { 'normal': 'type-normal', 'developer': 'type-developer', 'vip': 'type-vip', 'owner': 'type-owner' };

    class WebCraftApp {
      constructor() {
        this.webApp = window.Eitaa && window.Eitaa.WebApp ? window.Eitaa.WebApp : null;
        if (this.webApp) { this.webApp.ready(); this.webApp.expand(); }
      }
    }

    function checkSession() {
      const sessionData = localStorage.getItem('webcraft_session');
      if (!sessionData) return null;
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('webcraft_session');
          return null;
        }
        return session.user;
      } catch (e) {
        localStorage.removeItem('webcraft_session');
        return null;
      }
    }

    function handleLogout() {
      localStorage.removeItem('webcraft_session');
      window.location.href = 'login.html';
    }

    function showMainContent() {
      document.getElementById('loadingContainer').style.display = 'none';
      document.getElementById('mainContainer').classList.add('loaded');
    }

    async function loadPlanInfo() {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getUserPlanInfo', userId: currentUser.userId })
        });
        const data = await res.json();
        if (data) {
          maxProjects = data.maxProjects || 1;
          document.getElementById('infoPlan').textContent = data.planNames ? data.planNames.join('، ') : 'رایگان';
          const tagsContainer = document.getElementById('plansTags');
          if (data.purchasedPlans && data.purchasedPlans.length > 0) {
            tagsContainer.innerHTML = data.purchasedPlans.map((planId, index) => {
              const planName = data.planNames ? data.planNames[index] : planId;
              return `<span class="plan-tag">${planName}</span>`;
            }).join('');
          }
          const hasOnlyFree = data.purchasedPlans && data.purchasedPlans.length === 1 && data.purchasedPlans[0] === 'plan_free';
          document.getElementById('upgradeCard').style.display = hasOnlyFree ? 'block' : 'none';
        }
      } catch (e) { maxProjects = 1; }
    }

    async function updateProjectStats() {
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getUserProjects', userId: currentUser.userId })
        });
        const projects = await res.json();
        const usedProjects = projects ? projects.length : 0;
        const remaining = Math.max(0, maxProjects - usedProjects);
        document.getElementById('statUsed').textContent = usedProjects;
        document.getElementById('statMax').textContent = maxProjects >= 999 ? 'نامحدود' : maxProjects;
        document.getElementById('statRemaining').textContent = maxProjects >= 999 ? 'نامحدود' : remaining;
        document.getElementById('remainingBadge').textContent = maxProjects >= 999 ? '∞' : remaining;
      } catch (e) {
        document.getElementById('statUsed').textContent = '?';
      }
    }

    async function loadProfile() {
      currentUser = checkSession();
      if (!currentUser) { window.location.href = 'login.html'; return; }
      await loadPlanInfo();

      const avatarIcon = currentUser.avatar || 'fa-user';
      document.getElementById('avatarDisplay').innerHTML = `<i class="fa-solid ${avatarIcon}"></i>`;
      document.getElementById('displayName').textContent = currentUser.fullName || '---';
      document.getElementById('displayUsername').textContent = '@' + (currentUser.username || '---');
      document.getElementById('infoFullName').textContent = currentUser.fullName || '---';
      document.getElementById('infoUsername').textContent = currentUser.username || '---';

      const type = currentUser.userType || 'normal';
      const badge = document.getElementById('typeBadge');
      badge.textContent = userTypeLabels[type] || 'عادی';
      badge.className = 'type-badge ' + (userTypeClasses[type] || 'type-normal');

      await updateProjectStats();
      selectedAvatar = avatarIcon;
      buildAvatarPicker();
      showMainContent();
    }

    function buildAvatarPicker() {
      const picker = document.getElementById('avatarPicker');
      picker.innerHTML = avatarIcons.map(icon => `
        <div class="avatar-option ${icon === selectedAvatar ? 'selected' : ''}" onclick="selectAvatar('${icon}')">
          <i class="fa-solid ${icon}"></i>
        </div>
      `).join('');
    }

    function selectAvatar(icon) {
      selectedAvatar = icon;
      document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
    }

    function openEditModal() {
      document.getElementById('editFullName').value = currentUser.fullName || '';
      document.getElementById('editUsername').value = currentUser.username || '';
      document.getElementById('editPassword').value = '';
      document.getElementById('editMessage').textContent = '';
      document.getElementById('editMessage').className = 'form-message';
      selectedAvatar = currentUser.avatar || 'fa-user';
      buildAvatarPicker();
      document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }

    async function saveProfile() {
      const msgEl = document.getElementById('editMessage');
      const fullName = document.getElementById('editFullName').value.trim();
      const username = document.getElementById('editUsername').value.trim();
      const password = document.getElementById('editPassword').value;
      if (!fullName || !username) {
        msgEl.textContent = 'نام کامل و نام کاربری الزامی است';
        msgEl.className = 'form-message error';
        return;
      }
      msgEl.textContent = 'در حال ذخیره...';
      msgEl.className = 'form-message';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'updateProfile',
            userId: currentUser.userId,
            fullName: fullName,
            username: username,
            avatar: selectedAvatar,
            password: password || ''
          })
        });
        const data = await res.json();
        if (data.success) {
          currentUser.fullName = fullName;
          currentUser.username = username;
          currentUser.avatar = selectedAvatar;
          const sessionData = JSON.parse(localStorage.getItem('webcraft_session'));
          sessionData.user = currentUser;
          localStorage.setItem('webcraft_session', JSON.stringify(sessionData));
          msgEl.textContent = 'تغییرات با موفقیت ذخیره شد';
          msgEl.className = 'form-message success';
          setTimeout(() => { closeEditModal(); loadProfile(); }, 800);
        } else {
          msgEl.textContent = data.message || 'خطا در ذخیره تغییرات';
          msgEl.className = 'form-message error';
        }
      } catch (e) {
        msgEl.textContent = 'خطا در ارتباط با سرور';
        msgEl.className = 'form-message error';
      }
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeEditModal();
    });

    (function init() {
      new WebCraftApp();
      loadProfile();
    })();
  </script>

</body>
</html>
