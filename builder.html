<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebCraft | ساخت سایت</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>
  <script src="https://unpkg.com/blockly@10.4.3/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.3/blocks/html.min.js"></script>
  <script src="https://unpkg.com/blockly@10.4.3/msg/fa.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --bg2: #f1f5f9; --bg3: #e2e8f0;
      --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
      --dark: #0f172a; --text: #334155; --text-light: #94a3b8;
      --white: #ffffff; --red: #f43f5e; --green: #10b981;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; margin: 0; padding: 0;
    }

    .header {
      background: var(--white); box-shadow: 0 1px 8px rgba(0,0,0,0.03);
      padding: 10px 16px; position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--bg3); display: flex;
      align-items: center; justify-content: space-between; gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
    }
    .header-logo i { font-size: 17px; color: #fff; }
    .header-title { font-size: 17px; font-weight: 700; color: var(--dark); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .header-btn {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; text-decoration: none;
      padding: 7px 12px; border-radius: 8px;
      transition: all 0.2s ease; white-space: nowrap;
      font-family: inherit; cursor: pointer; background: none; border: 1.5px solid var(--bg3);
      color: var(--text);
    }
    .header-btn:hover { background: var(--bg2); }
    .btn-run { background: var(--green); color: #fff; border: none; }
    .btn-run:hover { background: #059669; }

    .builder-container {
      flex: 1; display: flex; overflow: hidden;
    }

    .blockly-area {
      flex: 1; height: calc(100vh - 56px);
    }

    .settings-panel {
      width: 320px; background: var(--white); border-right: 1px solid var(--bg3);
      overflow-y: auto; padding: 12px; display: none; flex-shrink: 0;
    }
    .settings-panel.show { display: block; }
    .settings-panel::-webkit-scrollbar { width: 4px; }
    .settings-panel::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 8px; }

    .settings-section {
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid var(--bg2);
    }
    .settings-section:last-child { border-bottom: none; }
    .settings-section h4 {
      font-size: 13px; color: var(--dark); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .settings-section h4 i { color: var(--primary); font-size: 12px; }
    
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; gap: 8px;
    }
    .setting-row label { font-size: 11px; color: var(--text-light); }
    .setting-row select, .setting-row input {
      padding: 6px 10px; border: 1px solid var(--bg3); border-radius: 8px;
      font-size: 11px; font-family: inherit; background: var(--bg);
      color: var(--text); outline: none; max-width: 150px;
    }
    .setting-row select:focus, .setting-row input:focus {
      border-color: var(--primary);
    }

    .color-palette {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
    }
    .color-dot {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all 0.2s;
    }
    .color-dot:hover { border-color: var(--primary); transform: scale(1.1); }
    .color-dot.selected { border-color: var(--dark); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }

    .tabs-row {
      display: flex; border-bottom: 1px solid var(--bg3); margin-bottom: 12px;
    }
    .tab-item {
      flex: 1; text-align: center; padding: 8px; font-size: 11px;
      font-weight: 600; cursor: pointer; color: var(--text-light);
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

    @media (max-width: 768px) {
      .builder-container { flex-direction: column; }
      .settings-panel { width: 100%; max-height: 40vh; border-right: none; border-top: 1px solid var(--bg3); }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="header-logo"><i class="fa-solid fa-cubes"></i></div>
      <span class="header-title">WebCraft Builder</span>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="toggleSettings()">
        <i class="fa-solid fa-sliders"></i> تنظیمات
      </button>
      <button class="header-btn" onclick="generateCode()">
        <i class="fa-solid fa-code"></i> کد
      </button>
      <button class="header-btn" onclick="previewSite()">
        <i class="fa-solid fa-eye"></i> پیش‌نمایش
      </button>
      <a href="dashboard.html" class="header-btn">
        <i class="fa-solid fa-save"></i> ذخیره
      </a>
    </div>
  </header>

  <div class="builder-container">
    <div class="settings-panel" id="settingsPanel">
      <div class="tabs-row">
        <div class="tab-item active" onclick="switchSettingsTab('appearance')">ظاهری</div>
        <div class="tab-item" onclick="switchSettingsTab('script')">اسکریپت</div>
        <div class="tab-item" onclick="switchSettingsTab('sound')">صوت</div>
        <div class="tab-item" onclick="switchSettingsTab('storage')">ذخیره‌سازی</div>
      </div>

      <div id="tab-appearance">
        <div class="settings-section">
          <h4><i class="fa-solid fa-palette"></i> رنگ‌ها</h4>
          <div class="setting-row">
            <label>هدر</label>
            <input type="color" id="headerColor" value="#0f172a" onchange="updateSetting('headerColor', this.value)">
          </div>
          <div class="setting-row">
            <label>بادی</label>
            <input type="color" id="bodyColor" value="#f8fafc" onchange="updateSetting('bodyColor', this.value)">
          </div>
          <div class="setting-row">
            <label>فوتر</label>
            <input type="color" id="footerColor" value="#1e293b" onchange="updateSetting('footerColor', this.value)">
          </div>
          <div class="color-palette" id="colorPalette"></div>
        </div>

        <div class="settings-section">
          <h4><i class="fa-solid fa-text-height"></i> اندازه و فونت</h4>
          <div class="setting-row">
            <label>سایز هدر</label>
            <select id="headerSize" onchange="updateSetting('headerSize', this.value)">
              <option value="small">کوچیک</option>
              <option value="medium" selected>متوسط</option>
              <option value="large">بزرگ</option>
            </select>
          </div>
          <div class="setting-row">
            <label>سایز فوتر</label>
            <select id="footerSize" onchange="updateSetting('footerSize', this.value)">
              <option value="small">کوچیک</option>
              <option value="medium" selected>متوسط</option>
              <option value="large">بزرگ</option>
            </select>
          </div>
          <div class="setting-row">
            <label>فونت</label>
            <select id="fontFamily" onchange="updateSetting('fontFamily', this.value)">
              <option value="Vazir">وزیر</option>
              <option value="Yekan">یکان</option>
              <option value="IranSans">ایران‌سنس</option>
              <option value="Sahel">ساحل</option>
              <option value="Samim">صمیم</option>
            </select>
          </div>
        </div>

        <div class="settings-section">
          <h4><i class="fa-solid fa-layer-group"></i> نوع بادی</h4>
          <div class="setting-row">
            <label>چیدمان</label>
            <select id="bodyType" onchange="updateSetting('bodyType', this.value)">
              <option value="cards">کارتی (گزینه‌ای)</option>
              <option value="list">لیستی</option>
            </select>
          </div>
        </div>

        <div class="settings-section">
          <h4><i class="fa-solid fa-square"></i> کارت‌ها و دکمه‌ها</h4>
          <div class="setting-row">
            <label>استایل کارت</label>
            <select id="cardStyle" onchange="updateSetting('cardStyle', this.value)">
              <option value="shadow">سایه‌دار</option>
              <option value="border">خط‌دار</option>
              <option value="minimal">مینیمال</option>
            </select>
          </div>
          <div class="setting-row">
            <label>شکل دکمه</label>
            <select id="buttonShape" onchange="updateSetting('buttonShape', this.value)">
              <option value="rounded">گرد</option>
              <option value="square">مربع</option>
              <option value="pill">قرصی</option>
            </select>
          </div>
        </div>
      </div>

      <div id="tab-script" style="display:none;">
        <div class="settings-section">
          <h4><i class="fa-solid fa-code"></i> اسکریپت‌ها</h4>
          <div class="setting-row">
            <label>دکمه برگشت به بالا</label>
            <input type="checkbox" id="backToTop" onchange="updateSetting('backToTop', this.checked)">
          </div>
          <div class="setting-row">
            <label>اسکرول نرم</label>
            <input type="checkbox" id="smoothScroll" onchange="updateSetting('smoothScroll', this.checked)" checked>
          </div>
          <div class="setting-row">
            <label>حالت شب/روز</label>
            <input type="checkbox" id="darkMode" onchange="updateSetting('darkMode', this.checked)">
          </div>
          <div class="setting-row">
            <label>بزرگنمایی تصاویر</label>
            <input type="checkbox" id="imageZoom" onchange="updateSetting('imageZoom', this.checked)">
          </div>
          <div class="setting-row">
            <label>اسلایدر تصاویر</label>
            <input type="checkbox" id="slider" onchange="updateSetting('slider', this.checked)">
          </div>
          <div class="setting-row">
            <label>اشتراک‌گذاری</label>
            <input type="checkbox" id="shareButtons" onchange="updateSetting('shareButtons', this.checked)">
          </div>
        </div>
      </div>

      <div id="tab-sound" style="display:none;">
        <div class="settings-section">
          <h4><i class="fa-solid fa-music"></i> صوت‌ها</h4>
          <div class="setting-row">
            <label>صوت ۱</label>
            <input type="text" id="sound1" placeholder="لینک صوت" onchange="updateSetting('sound1', this.value)">
          </div>
          <div class="setting-row">
            <label>صوت ۲</label>
            <input type="text" id="sound2" placeholder="لینک صوت" onchange="updateSetting('sound2', this.value)">
          </div>
          <div class="setting-row">
            <label>صوت ۳</label>
            <input type="text" id="sound3" placeholder="لینک صوت" onchange="updateSetting('sound3', this.value)">
          </div>
        </div>
      </div>

      <div id="tab-storage" style="display:none;">
        <div class="settings-section">
          <h4><i class="fa-solid fa-database"></i> ذخیره‌سازی داده</h4>
          <div class="setting-row">
            <label>روش ذخیره‌سازی</label>
            <select id="storageMethod" onchange="updateSetting('storageMethod', this.value)">
              <option value="localStorage">localStorage</option>
              <option value="webcraft">WebCraft API</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="blockly-area" id="blocklyDiv"></div>
  </div>

  <xml id="toolbox" style="display: none;">
    <category name="چیدمان" colour="#6366f1">
      <block type="container"></block>
      <block type="row"></block>
      <block type="column"></block>
    </category>
    <category name="المان‌ها" colour="#10b981">
      <block type="heading"></block>
      <block type="paragraph"></block>
      <block type="button_element"></block>
      <block type="image_element"></block>
      <block type="link_element"></block>
      <block type="divider"></block>
    </category>
    <category name="فرم‌ها" colour="#f59e0b">
      <block type="form_container"></block>
      <block type="input_text"></block>
      <block type="input_email"></block>
      <block type="textarea_element"></block>
      <block type="submit_button"></block>
    </category>
    <category name="رسانه" colour="#a855f7">
      <block type="video_element"></block>
      <block type="audio_element"></block>
      <block type="icon_element"></block>
    </category>
    <category name="پیشرفته" colour="#f43f5e">
      <block type="html_raw"></block>
      <block type="style_raw"></block>
    </category>
  </xml>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxwzQT4V2OKe9Ag1P9tRL5OKB2wsryRdAwrDZ81ZwZYg-H8GdKKzusT8Y4tJbLu1S27/exec';
    const SESSION_DURATION = 3 * 60 * 60 * 1000;

    let workspace;
    let projectSettings = {
      headerColor: '#0f172a',
      bodyColor: '#f8fafc',
      footerColor: '#1e293b',
      headerSize: 'medium',
      footerSize: 'medium',
      fontFamily: 'Vazir',
      bodyType: 'cards',
      cardStyle: 'shadow',
      buttonShape: 'rounded',
      backToTop: false,
      smoothScroll: true,
      darkMode: false,
      imageZoom: false,
      slider: false,
      shareButtons: false,
      sound1: '',
      sound2: '',
      sound3: '',
      storageMethod: 'localStorage'
    };

    class WebCraftApp {
      constructor() {
        this.webApp = window.Eitaa && window.Eitaa.WebApp ? window.Eitaa.WebApp : null;
        if (this.webApp) { this.webApp.ready(); this.webApp.expand(); }
      }
    }

    function checkSession() {
      const sessionData = localStorage.getItem('webcraft_session');
      if (!sessionData) return null;
      try {
        const session = JSON.parse(sessionData);
        if (Date.now() - session.timestamp > SESSION_DURATION) {
          localStorage.removeItem('webcraft_session');
          return null;
        }
        return session.user;
      } catch (e) {
        localStorage.removeItem('webcraft_session');
        return null;
      }
    }

    function initBlockly() {
      const blocklyArea = document.getElementById('blocklyDiv');
      
      workspace = Blockly.inject(blocklyArea, {
        toolbox: document.getElementById('toolbox'),
        scrollbars: true,
        trashcan: true,
        rtl: true,
        zoom: {
          controls: true,
          wheel: true,
          startScale: 1.0,
          maxScale: 3,
          minScale: 0.3,
          scaleSpeed: 1.2
        },
        grid: {
          spacing: 20,
          length: 3,
          colour: '#e2e8f0',
          snap: true
        },
        move: {
          scrollbars: true,
          drag: true,
          wheel: true
        },
        renderer: 'zelos'
      });

      defineCustomBlocks();
      
      workspace.addChangeListener(() => {
        if (workspace.isDragging && workspace.isDragging()) return;
      });

      window.addEventListener('resize', () => {
        Blockly.svgResize(workspace);
      });

      Blockly.svgResize(workspace);
    }

    function defineCustomBlocks() {
      Blockly.defineBlocksWithJsonArray([
        {
          type: 'container',
          message0: 'کانتینر %1',
          args0: [
            {
              type: 'input_statement',
              name: 'CONTENT'
            }
          ],
          previousStatement: null,
          nextStatement: null,
          colour: '#6366f1',
          tooltip: 'یه کانتینر برای محتوا',
          helpUrl: ''
        },
        {
          type: 'heading',
          message0: 'عنوان %1',
          args0: [
            {
              type: 'field_input',
              name: 'TEXT',
              value: 'عنوان اینجاست'
            }
          ],
          previousStatement: null,
          nextStatement: null,
          colour: '#10b981',
          tooltip: 'یه متن عنوان',
          helpUrl: ''
        },
        {
          type: 'paragraph',
          message0: 'متن %1',
          args0: [
            {
              type: 'field_input',
              name: 'TEXT',
              value: 'متن خود را اینجا بنویسید...'
            }
          ],
          previousStatement: null,
          nextStatement: null,
          colour: '#10b981',
          tooltip: 'یه پاراگراف متنی',
          helpUrl: ''
        },
        {
          type: 'button_element',
          message0: 'دکمه %1 با لینک %2',
          args0: [
            {
              type: 'field_input',
              name: 'TEXT',
              value: 'کلیک کن'
            },
            {
              type: 'field_input',
              name: 'LINK',
              value: '#'
            }
          ],
          previousStatement: null,
          nextStatement: null,
          colour: '#10b981',
          tooltip: 'یه دکمه با لینک',
          helpUrl: ''
        },
        {
          type: 'image_element',
          message0: 'تصویر %1 اندازه %2',
          args0: [
            {
              type: 'field_input',
              name: 'SRC',
              value: 'https://'
            },
            {
              type: 'field_dropdown',
              name: 'SIZE',
              options: [
                ['کوچیک', 'small'],
                ['متوسط', 'medium'],
                ['بزرگ', 'large']
              ]
            }
          ],
          previousStatement: null,
          nextStatement: null,
          colour: '#10b981',
          tooltip: 'یه المان تصویر',
          helpUrl: ''
        }
      ]);
    }

    function updateSetting(key, value) {
      projectSettings[key] = value;
      if (key === 'bodyColor') {
        document.getElementById('bodyColor').value = value;
      }
      if (key === 'headerColor') {
        document.getElementById('headerColor').value = value;
      }
      if (key === 'footerColor') {
        document.getElementById('footerColor').value = value;
      }
    }

    function toggleSettings() {
      const panel = document.getElementById('settingsPanel');
      panel.classList.toggle('show');
      Blockly.svgResize(workspace);
    }

    function switchSettingsTab(tab) {
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      event.currentTarget.classList.add('active');
      
      document.getElementById('tab-appearance').style.display = tab === 'appearance' ? 'block' : 'none';
      document.getElementById('tab-script').style.display = tab === 'script' ? 'block' : 'none';
      document.getElementById('tab-sound').style.display = tab === 'sound' ? 'block' : 'none';
      document.getElementById('tab-storage').style.display = tab === 'storage' ? 'block' : 'none';
    }

    function generateCode() {
      try {
        let html = '<!DOCTYPE html>\n<html lang="fa" dir="rtl">\n<head>\n';
        html += '<meta charset="UTF-8">\n';
        html += '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n';
        html += '<title>سایت ساخته شده با WebCraft</title>\n';
        html += '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">\n';
        html += '<style>\n';
        html += generateCSS();
        html += '</style>\n</head>\n<body>\n';
        html += generateBodyHTML();
        html += generateScripts();
        html += '</body>\n</html>';
        
        document.getElementById('codeOutput') && (document.getElementById('codeOutput').textContent = html);
        alert('کد تولید شد! می‌تونید توی تب "کد" مشاهده کنید.');
      } catch (e) {
        alert('خطا در تولید کد: ' + e.message);
      }
    }

    function generateCSS() {
      const s = projectSettings;
      return `
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: ${s.fontFamily}, sans-serif; 
    background: ${s.bodyColor}; 
    ${s.smoothScroll ? 'scroll-behavior: smooth;' : ''}
  }
  .header { background: ${s.headerColor}; padding: ${s.headerSize === 'large' ? '24px' : s.headerSize === 'small' ? '8px' : '16px'}; }
  .footer { background: ${s.footerColor}; padding: ${s.footerSize === 'large' ? '24px' : s.footerSize === 'small' ? '8px' : '16px'}; }
  .card { 
    border-radius: ${s.buttonShape === 'rounded' ? '12px' : s.buttonShape === 'pill' ? '24px' : '4px'};
    ${s.cardStyle === 'shadow' ? 'box-shadow: 0 2px 12px rgba(0,0,0,0.08);' : s.cardStyle === 'border' ? 'border: 1px solid #e2e8f0;' : ''}
  }
  .btn {
    border-radius: ${s.buttonShape === 'rounded' ? '8px' : s.buttonShape === 'pill' ? '24px' : '2px'};
    padding: 10px 20px; background: #6366f1; color: #fff; border: none; cursor: pointer;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 16px; }`;
    }

    function generateBodyHTML() {
      let html = '  <header class="header">\n    <div class="container">\n      <h1>سایت من</h1>\n    </div>\n  </header>\n\n';
      html += '  <main class="container">\n';
      
      if (projectSettings.bodyType === 'cards') {
        html += '    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">\n';
        html += '      <div class="card" style="padding: 20px; background: #fff;"><h3>کارت ۱</h3><p>محتوای کارت</p></div>\n';
        html += '      <div class="card" style="padding: 20px; background: #fff;"><h3>کارت ۲</h3><p>محتوای کارت</p></div>\n';
        html += '      <div class="card" style="padding: 20px; background: #fff;"><h3>کارت ۳</h3><p>محتوای کارت</p></div>\n';
        html += '    </div>\n';
      } else {
        html += '    <ul style="list-style: none; padding: 0;">\n';
        html += '      <li class="card" style="padding: 16px; background: #fff; margin-bottom: 8px;">آیتم ۱</li>\n';
        html += '      <li class="card" style="padding: 16px; background: #fff; margin-bottom: 8px;">آیتم ۲</li>\n';
        html += '      <li class="card" style="padding: 16px; background: #fff; margin-bottom: 8px;">آیتم ۳</li>\n';
        html += '    </ul>\n';
      }
      
      html += '  </main>\n\n';
      html += '  <footer class="footer">\n    <div class="container">\n      <p style="color: #fff; text-align: center;">ساخته شده با WebCraft</p>\n    </div>\n  </footer>\n';
      return html;
    }

    function generateScripts() {
      let scripts = '\n  <script>\n';
      if (projectSettings.backToTop) {
        scripts += `
    const backToTop = document.createElement('button');
    backToTop.innerHTML = '↑';
    backToTop.style.cssText = 'position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:#6366f1;color:#fff;border:none;cursor:pointer;display:none;z-index:999;';
    document.body.appendChild(backToTop);
    window.addEventListener('scroll', () => { backToTop.style.display = window.scrollY > 300 ? 'block' : 'none'; });
    backToTop.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); });\n`;
      }
      if (projectSettings.darkMode) {
        scripts += `
    const darkToggle = document.createElement('button');
    darkToggle.innerHTML = '🌙';
    darkToggle.style.cssText = 'position:fixed;top:20px;left:20px;width:44px;height:44px;border-radius:50%;background:#6366f1;color:#fff;border:none;cursor:pointer;z-index:999;';
    document.body.appendChild(darkToggle);
    darkToggle.addEventListener('click', () => { document.body.classList.toggle('dark-mode'); });\n`;
      }
      scripts += '  <\/script>\n';
      return scripts;
    }

    function previewSite() {
      const html = '<!DOCTYPE html>\n<html lang="fa" dir="rtl">\n<head>\n<meta charset="UTF-8">\n<style>\n' + generateCSS() + '</style>\n</head>\n<body>\n' + generateBodyHTML() + generateScripts() + '</body>\n</html>';
      const preview = window.open('', '_blank');
      preview.document.write(html);
      preview.document.close();
    }

    function initColorPalette() {
      const colors = ['#0f172a', '#1e293b', '#334155', '#6366f1', '#4f46e5', '#10b981', '#059669', '#f59e0b', '#f43f5e', '#8b5cf6'];
      const palette = document.getElementById('colorPalette');
      palette.innerHTML = colors.map(c => `<div class="color-dot" style="background:${c}" onclick="quickSetColor('${c}')"></div>`).join('');
    }

    function quickSetColor(color) {
      document.getElementById('headerColor').value = color;
      projectSettings.headerColor = color;
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
    }

    (function init() {
      const user = checkSession();
      if (!user) { window.location.href = 'login.html'; return; }
      
      new WebCraftApp();
      initBlockly();
      initColorPalette();
    })();
  </script>
</body>
</html>
